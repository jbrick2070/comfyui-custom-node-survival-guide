# ComfyUI Custom Node Bug Bible
# Machine-readable lessons learned shipping complex custom nodes and multi-model pipelines.
#
# Organized in the order an AI actually writes and debugs a custom node pack:
#   01. Bootstrap & Discovery
#   02. Environment & Dependencies
#   03. Registration & Loading
#   04. INPUT_TYPES & Widgets
#   05. Execution Model
#   06. Caching & IS_CHANGED
#   07. Tensors, Audio, Video
#   08. I/O & Output Nodes
#   09. Subprocess & Network
#   10. Safety, Pools, RNG
#   11. LLM-Specific
#   12. Regression, Git, Handoff
#
# Every entry keeps its original legacy_id so external references still resolve.
# Each entry: id, phase, area, symptom, cause, fix, verify, tags, legacy_id.
#
# MAINTENANCE RULE: When adding or editing a bug entry, you MUST also:
#   1. Update README.md (entry count, coverage table if new phase/area)
#   2. Add or update the corresponding test in tests/bug_bible_regression.py
#      (if the verify step can be checked by static file analysis)
#   3. Run: python -m pytest tests/bug_bible_regression.py -v --pack-dir <your-pack>
# All three files (README, YAML, test .py) must stay in sync at all times.

schema:
  id: str             # new sequential id
  phase: int          # 1-12 workflow phase
  area: str           # normalized area vocabulary
  symptom: "str        # what you see"
  cause: "str          # why it happens"
  fix: "str            # how to resolve"
  verify: "str         # how to confirm resolution"
  tags: [str]         # searchable keywords
  legacy_id: str      # original id from prior versions

bugs:

# ─────────────────────────────────────────────────────────────
# PHASE 01 — BOOTSTRAP & DISCOVERY
# Finding ComfyUI, picking paths, first contact with the environment.
# ─────────────────────────────────────────────────────────────

- id: "01.01"
  phase: 1
  area: discovery
  symptom: ComfyUI isn't where standard path guesses say it is (Desktop App installs).
  cause: Desktop App installs launcher to AppData but workspace to Documents.
  fix: Use `Get-Process python* | Select Id, Path` to find the running interpreter; the workspace is its parent's parent.
  verify: Path matches the running process.
  tags: [discovery, paths, desktop-app]
  legacy_id: "55"

- id: "01.02"
  phase: 1
  area: paths
  symptom: Output files end up in wrong directory across launch methods or blocked by ComfyUI security.
  cause: Relative paths or hand-rolled path construction.
  fix: Use folder_paths.get_output_directory() and folder_paths.get_temp_directory(). Use temp_dir for intermediates, output_dir for deliverables.
  verify: File appears in ComfyUI's file browser.
  tags: [paths, folder_paths]
  legacy_id: "30"

- id: "01.03"
  phase: 1
  area: paths
  symptom: Output files end up nested inside the node pack instead of in ComfyUI's output dir.
  cause: os.path.dirname(__file__) chain miscount when constructing paths.
  fix: Use folder_paths.get_output_directory(). Never chain dirname() to navigate up.
  verify: Output appears in expected directory.
  tags: [paths, output_dir, sandbox]
  legacy_id: "57"

- id: "01.04"
  phase: 1
  area: discovery
  symptom: |
    Killing ComfyUI's process hangs indefinitely. taskkill /F /IM python.exe or Stop-Process -Name python never completes on a GPU system.
  cause: |
    ComfyUI Desktop is an Electron app. The visible process is ComfyUI.exe (or comfyui.exe), not python.exe. CUDA-bound Python subprocesses hold GPU memory handles that prevent clean termination when you kill the inner process. The Electron wrapper must be killed first — it tears down the child tree cleanly.
  fix: |
    Discover the actual process name before writing any restart/kill logic. On Windows: Get-Process | Where-Object { $_.ProcessName -match "ComfyUI" }. Kill the outermost wrapper: Stop-Process -Name ComfyUI -Force. Never target python.exe on a system where ComfyUI runs as a Desktop app. Wait 3 seconds after kill before relaunching to let CUDA release.
  verify: |
    After Stop-Process -Name ComfyUI -Force, the process disappears within 5 seconds. No orphaned python.exe processes remain. GPU memory is fully released (nvidia-smi shows 0 MiB for the process).
  tags: [discovery, desktop-app, electron, process-kill, cuda, gpu, restart]
  legacy_id: ""

# ─────────────────────────────────────────────────────────────
# PHASE 02 — ENVIRONMENT & DEPENDENCIES
# Python, pip, venvs, CUDA wheels, HF cache, transformers, encoding.
# ─────────────────────────────────────────────────────────────

- id: "02.01"
  phase: 2
  area: python
  symptom: pip install succeeds but ComfyUI throws ModuleNotFoundError.
  cause: pip installed into system Python, not ComfyUI's python_embeded.
  fix: Always use the explicit ComfyUI python path. `.\python_embeded\python.exe -m pip install <pkg>`.
  verify: '"`.\\python_embeded\\python.exe -c \"import <pkg>\"` succeeds."'
  tags: [pip, venv, python_embeded]
  legacy_id: "32"

- id: "02.02"
  phase: 2
  area: cuda
  symptom: torch.cuda.is_available() returns False after pip install of a torch-related package.
  cause: pip downloaded the CPU-only wheel, overwriting CUDA torch.
  fix: Always specify --index-url https://download.pytorch.org/whl/cu130 when installing torch-related packages into python_embeded.
  verify: After every install, run torch.cuda.is_available() check.
  tags: [pip, torch, cuda, wheel]
  legacy_id: "41"

- id: "02.03"
  phase: 2
  area: cuda
  symptom: Flash Attention 2 wheel install appears to work then torch is broken.
  cause: No prebuilt FA2 wheel exists for torch 2.10 + CUDA 13 + Blackwell sm_120 on Windows. Community wheels target older torch/CUDA combos and overwrite your install.
  fix: Do NOT attempt FA2 install on this platform. SageAttention + SDPA already active. Log a platform-accurate message so future you doesn't chase it again.
  verify: Startup log states "Flash Attention 2 NOT AVAILABLE - no prebuilt wheel for this platform" with exact torch/CUDA/arch. No attempt to install.
  tags: [flash-attention, sage-attention, blackwell, cuda13, torch210]
  legacy_id: ""
- id: "02.04"
  phase: 2
  area: huggingface
  symptom: "C: drive fills up; model downloads take 2x expected; multi-GB duplicates in .cache\\huggingface."
  cause: HuggingFace symlinks require Developer Mode or admin on Windows. Without them, files are duplicated.
  fix: Enable Developer Mode (Settings > Developer settings), OR set HF_HOME=D:\hf_cache to a short path on a large drive. Enable Win32 long paths.
  verify: New downloads create symlinks not copies; check folder size.
  tags: [hf, windows, symlink, max_path, huggingface]
  legacy_id: "31"

- id: "02.05"
  phase: 2
  area: env
  symptom: HF_HOME or other env vars set in __init__.py have no effect.
  cause: By the time __init__.py runs, libraries already read defaults.
  fix: Use prestartup_script.py at the custom_nodes/<pack> level. Runs BEFORE node imports. Keep it lightweight, no heavy imports.
  verify: Print env var from inside a node and confirm it matches.
  tags: [env, bootstrap, prestartup]
  legacy_id: "44"

- id: "02.06"
  phase: 2
  area: deps
  symptom: Installing one node pack breaks another. numpy downgrade. torch overwritten.
  cause: No global dependency resolver in ComfyUI ecosystem.
  fix: Pin requirements LOOSELY (transformers>=4.40,<6.0). Never pin torch in requirements.txt (ComfyUI manages it). Use try/except with fallback paths around version-sensitive imports.
  verify: Pre-flight _check_deps() function in __init__.py reports issues.
  tags: [requirements, conflicts]
  legacy_id: "45"

- id: "02.07"
  phase: 2
  area: transformers
  symptom: Deprecation warnings around torch_dtype.
  cause: transformers 5.0 deprecated torch_dtype param.
  fix: Use `dtype=torch.float16` instead of `torch_dtype=torch.float16`.
  verify: No warning on model load.
  tags: [transformers5, deprecation]
  legacy_id: "47.1"

- id: "02.08"
  phase: 2
  area: transformers
  symptom: Model load fails with "requires accelerate" even though accelerate IS installed.
  cause: ComfyUI calls torch.set_default_device("cuda") before nodes load. transformers 5.0 device_map="auto" interaction with set_default_device fails the check.
  fix: Skip device_map entirely. Use `model = from_pretrained(name, dtype=fp16).to("cuda").eval()`.
  verify: Standalone test outside ComfyUI passes; the bug only appears INSIDE ComfyUI.
  tags: [transformers5, device_map, accelerate]
  legacy_id: "47.2"

- id: "02.09"
  phase: 2
  area: transformers
  symptom: pipeline("summarization", ...) raises "Unknown task summarization."
  cause: transformers 5.0 removed the summarization pipeline task.
  fix: Use AutoModelForSeq2SeqLM directly with tokenizer + .generate().
  verify: Standalone test calls .generate() and gets text output.
  tags: [transformers5, pipeline]
  legacy_id: "47.3"

- id: "02.10"
  phase: 2
  area: transformers
  symptom: Phi-3 (or other) model fails with TypeError('type') on load.
  cause: trust_remote_code=True loaded custom modeling_*.py written for transformers 4.x against 5.x API.
  fix: REMOVE trust_remote_code=True. Models natively supported by your transformers version do not need it.
  verify: Check official transformers docs for native model support. Use log.exception() not log.warning() to see the real traceback.
  tags: [transformers5, trust_remote_code]
  legacy_id: "49"

- id: "02.11"
  phase: 2
  area: encoding
  symptom: Mojibake (garbage chars like "â€") in Python source files after PowerShell edit.
  cause: Set-Content uses system default encoding (often UTF-16LE), re-encodes UTF-8 multi-byte sequences.
  fix: Use [System.IO.File]::WriteAllText($path, $content, [System.Text.Encoding]::UTF8). Or write from Linux side.
  verify: head -c3 file | xxd shows no BOM; non-ASCII chars intact.
  tags: [powershell, encoding, utf-8]
  legacy_id: "52.1"

- id: "02.12"
  phase: 2
  area: encoding
  symptom: Subtle .py import failures or integrity hash mismatches after PowerShell write.
  cause: BOM (EF BB BF) prepended by Out-File / Set-Content.
  fix: Use [System.IO.File]::WriteAllBytes($path, [System.Text.Encoding]::UTF8.GetBytes($content)).
  verify: head -c3 file | xxd shows no BOM bytes.
  tags: [powershell, bom]
  legacy_id: "52.2"

- id: "02.13"
  phase: 2
  area: encoding
  symptom: File written from sandbox doesn't appear on Windows host.
  cause: Mount layer doesn't propagate writes reliably.
  fix: Base64-encode in sandbox, decode with WriteAllBytes on Windows side. Verify via Get-Content + Select-String before committing.
  verify: Fresh git clone shows the file with clean UTF-8.
  tags: [mount, sandbox, transfer]
  legacy_id: "52.3"

# ─────────────────────────────────────────────────────────────
# PHASE 03 — REGISTRATION & LOADING
# __init__.py, lazy imports, namespacing, combo registration.
# ─────────────────────────────────────────────────────────────

- id: "03.01"
  phase: 3
  area: loading
  symptom: One broken node crashes the entire pack on import.
  cause: Default __init__.py imports all nodes at module scope.
  fix: Use isolated per-node loading via importlib.import_module wrapped in try/except. Each node failure logs a warning but doesn't crash siblings.
  verify: Intentionally break one node; siblings still register.
  tags: [init, isolation]
  legacy_id: "8"

- id: "03.02"
  phase: 3
  area: loading
  symptom: ComfyUI startup is slow (30+ seconds).
  cause: Heavy libraries (torch, transformers, torchaudio) imported at module scope.
  fix: Move heavy imports inside execute(). Node registers instantly; pays cost only when run.
  verify: Time __init__.py import.
  tags: [init, lazy-import, startup]
  legacy_id: "8.1"

- id: "03.03"
  phase: 3
  area: naming
  symptom: Two node packs declare the same NODE_CLASS_MAPPINGS key. One silently disappears from UI.
  cause: ComfyUI lets one win silently on collision.
  fix: Always namespace node IDs with your pack name (MyPack_Sanitizer, not Sanitizer). Treat keys as permanent public API, never rename.
  verify: Grep ComfyUI registry for collisions before publishing.
  tags: [naming, namespace, collision]
  legacy_id: "22"

- id: "03.04"
  phase: 3
  area: combo
  symptom: Node crashes at registration when COMBO source directory is empty. Or "Value not in list" on workflow load after model rename.
  cause: COMBO with empty list crashes; saved values validated against current list.
  fix: Always include a fallback option ["(no models found)"]. In VALIDATE_INPUTS, fall back to first available option if saved value missing instead of crashing.
  verify: Fresh install with empty model dir registers cleanly.
  tags: [combo, registration]
  legacy_id: "33"

# ─────────────────────────────────────────────────────────────
# PHASE 04 — INPUT_TYPES & WIDGETS
# Widget positional pitfalls, hidden inputs, validation, lazy inputs.
# ─────────────────────────────────────────────────────────────

- id: "04.06"
  phase: 4
  area: widgets
  symptom: Node widget default value overrides LLM-generated output on every run; file paths, titles, seed values lock to hardcoded defaults.
  cause: Workflow JSON hardcodes widget defaults (e.g. "The Last Frequency") on multiple nodes. Title extraction only handles dict format, not list format, so falls through to widget default silently on every run.
  fix: |
    (1) Clear hardcoded defaults in workflow JSON — set to empty string "" on writer/video nodes.
    (2) Add multi-tier title resolution: LLM-parsed (first), derived from content (second), widget fallback (third), hard-fail if stuck default (last).
    (3) Log `TITLE_TRACE | raw="..." | parsed="..." | final="..."` so future runs surface the decision.
    (4) In title-extraction code, scan both dict-format top-level `title` and list-format `{"type": "title", "value": ...}` tokens.
  verify: Filename and title vary across 5 consecutive runs. TITLE_TRACE logs show non-stuck values. No fallback to stuck default shows in logs.
  tags: [widget-default, title, stuck, override, workflow-json]
  legacy_id: BUG-LOCAL-035

- id: "04.01"
  phase: 4
  area: widgets
  symptom: Widget shows wrong value after loading saved workflow. No error.
  cause: widgets_values is positional, not named. Adding/removing/reordering INPUT_TYPES optional widgets shifts every position after the change.
  fix: Every time you add, remove, or reorder an optional widget, manually update widgets_values in EVERY saved workflow JSON. Prefer append-only changes. Commit code + workflow JSONs in the same atomic commit.
  verify: For every node, count INPUT_TYPES optional widgets and compare to len(widgets_values). They must match.
  tags: [widgets, json, silent, workflow-json]
  legacy_id: "2"

- id: "04.02"
  phase: 4
  area: widgets
  symptom: After removing a widget from INPUT_TYPES, saved workflows load with values mapped into the wrong widgets.
  cause: widgets_values is positional. Removal shifts subsequent positions.
  fix: Manually delete the corresponding positional entry from widgets_values in EVERY saved workflow JSON. Prefer append-only INPUT_TYPES changes. Commit code + JSON together.
  verify: Audit script loads each workflow and checks widget count vs array length.
  tags: [widgets, json, removal, workflow-json]
  legacy_id: "51"

- id: "04.03"
  phase: 4
  area: hidden-inputs
  symptom: Multiple instances of same node share cached state and cross-contaminate.
  cause: Module-level cache uses a fixed key, not per-instance.
  fix: '"Declare `\"hidden\": {\"unique_id\": \"UNIQUE_ID\"}` in INPUT_TYPES and use unique_id as cache key."'
  verify: Two instances in one workflow produce different outputs.
  tags: [hidden, cache, unique_id]
  legacy_id: "23"

- id: "04.04"
  phase: 4
  area: validation
  symptom: VALIDATE_INPUTS rejects a connected (slot) input as None even though runtime would receive a real value.
  cause: Connected inputs arrive as None during validation.
  fix: "Always check `if input is None: return True` first. Only validate values that are actually present."
  verify: Connect a Primitive to the input; workflow runs.
  tags: [validate_inputs, none]
  legacy_id: "24"

- id: "04.05"
  phase: 4
  area: lazy
  symptom: Disabled toggle still triggers expensive upstream model loads.
  cause: Default execution evaluates ALL upstream nodes before calling execute.
  fix: '"Mark expensive inputs `{\"lazy\": True}` in INPUT_TYPES. Implement check_lazy_status() to return [] when disabled. For blocking downstream too, return ExecutionBlocker(None)."'
  verify: Disable toggle; upstream LLM loader does not run.
  tags: [lazy, performance, executionblocker]
  legacy_id: "28"

# ─────────────────────────────────────────────────────────────
# PHASE 05 — EXECUTION MODEL
# Coordination, migration, list outputs, interrupts, execution order.
# ─────────────────────────────────────────────────────────────

- id: "05.01"
  phase: 5
  area: coordination
  symptom: Multiple node instances need to coordinate (e.g. cooperative camera selection) without a wire between them.
  cause: ComfyUI nodes execute independently with no shared channel.
  fix: Pass the same seed to all instances. Each computes the same shuffled order deterministically. Use sha256(unique_input)[:4] as offset to differentiate. For sequential modes, module-level dict + threading lock.
  verify: Same seed produces same allocation across runs.
  tags: [coordination, determinism, shared-seed]
  legacy_id: "13"

- id: "05.02"
  phase: 5
  area: migration
  symptom: After renaming a node class, every saved workflow shows red "node type not found."
  cause: Workflows store the old NODE_CLASS_MAPPINGS key.
  fix: Keep the old key as an alias in NODE_CLASS_MAPPINGS pointing to the new class. One line of code, permanent backward compat. For input renames, accept both names in execute() with fallback.
  verify: Load an old workflow JSON; node resolves.
  tags: [migration, alias, compat]
  legacy_id: "21"

- id: "05.03"
  phase: 5
  area: list-execution
  symptom: Returning a list from a node sends the whole list as one payload (downstream runs once).
  cause: Without OUTPUT_IS_LIST=(True,), ComfyUI wraps the return as a single value.
  fix: Set OUTPUT_IS_LIST=(True,) on the node class. For receivers that need ALL items at once, set INPUT_IS_LIST=True on the consumer.
  verify: Downstream runs N times for N-item list.
  tags: [batching, list]
  legacy_id: "27"

- id: "05.04"
  phase: 5
  area: interrupt
  symptom: Cancel button doesn't stop a running node; ComfyUI looks frozen during long ops.
  cause: Tight Python loops don't check the interrupt flag and don't report progress.
  fix: Call comfy.model_management.throw_exception_if_processing_interrupted() inside every loop iteration. Use comfy.utils.ProgressBar to emit step updates.
  verify: Cancel mid-run; node stops within one iteration.
  tags: [interrupt, progress, ux]
  legacy_id: "29"

- id: "05.05"
  phase: 5
  area: execution-order
  symptom: Two nodes that both read a module cache execute in wrong order; downstream gets stale/empty data.
  cause: No data dependency between them. ComfyUI executor picks any order.
  fix: Add a fake forced INT input on the dependent node wired from an output of the producer (forceInput=True). Better, pass real data through the graph instead of module cache.
  verify: Producer always runs before consumer.
  tags: [execution-order, dummy-link]
  legacy_id: "50"

- id: "05.06"
  phase: 5
  area: completion-check
  symptom: |
    Automation script declares MISSION COMPLETE but expected output artifacts (MP4, PNG) do not exist. Pipeline appeared to succeed when it actually failed silently.
  cause: |
    The completion check uses dict.get("completed", True) — defaulting to True when the key is missing. Any history entry, even a partial or failed one, passes the check. The script never verifies that actual output files were produced.
  fix: |
    Never default completion status to True. Use dict.get("completed", False). After status check passes, also verify that expected output artifacts exist on disk before declaring success. Example: check for the output MP4/PNG/WAV files listed in the workflow's SaveImage or SaveAudio nodes.
  verify: |
    Run a workflow that is expected to produce an MP4. Kill the server mid-run. The automation script must report FAILED, not MISSION COMPLETE. Alternatively: grep the auto-operator source for .get("completed", True) — it must not exist.
  tags: [execution-model, automation, false-success, artifact-check, completion]
  legacy_id: ""

- id: "05.07"
  phase: 5
  area: execution
  symptom: |
    NameError crash on every extension-pass run: `name '_false_positives' is not defined`.
    Extension pass silently short-circuits; every episode ships at un-extended word count.
  cause: Module-level constant is `_DIALOGUE_FALSE_POSITIVES` (line ~1545) but extension-pass code references abbreviated local name `_false_positives` (never bound). Python raises NameError, surrounding try/except logs it and returns unchanged.
  fix: Change reference to correct module-level constant name `_DIALOGUE_FALSE_POSITIVES`. Search the entire codebase for both the old and new name to confirm no stray references remain.
  verify: grep shows only the constant definition and the corrected references. Next real run emits target word counts instead of 0% extension.
  tags: [typo, extension, name-error, refactor, scope]
  legacy_id: BUG-LOCAL-036

# ─────────────────────────────────────────────────────────────
# PHASE 06 — CACHING & IS_CHANGED
# Stale outputs, IS_CHANGED edge cases, signature stability, leaks.
# ─────────────────────────────────────────────────────────────

- id: "06.01"
  phase: 6
  area: caching
  symptom: Data-fetch node returns stale results on re-execution.
  cause: ComfyUI caches outputs when inputs unchanged.
  fix: Implement IS_CHANGED returning time.time() (always refresh) or file mtime (refresh on change). Don't add to compute-heavy nodes that don't need it.
  verify: Re-queue a workflow; data-fetch node runs again.
  tags: [is_changed, cache]
  legacy_id: "12"

- id: "06.02"
  phase: 6
  area: caching
  symptom: IS_CHANGED crashes hashing a tensor.
  cause: Connected inputs arrive as None during IS_CHANGED, just like VALIDATE_INPUTS.
  fix: Check None first. Return float('nan') to force re-execute when value unavailable. Treat IS_CHANGED as a perf hint, not a contract.
  verify: Connected slot input doesn't crash.
  tags: [is_changed, none]
  legacy_id: "25"

- id: "06.03"
  phase: 6
  area: caching
  symptom: Node re-executes every run despite identical inputs (or sticks on old result).
  cause: Non-hashable object in input chain breaks ComfyUI's signature builder.
  fix: Keep inputs as plain types (str, int, float, bool, list, dict, tuple). Don't wrap MODEL/IMAGE/AUDIO. Convert complex objects to hashable representation first.
  verify: Hash-stable across runs.
  tags: [signature, cache]
  legacy_id: "35"

- id: "06.04"
  phase: 6
  area: memory
  symptom: Python process grows multi-GB over a long session and gets killed.
  cause: Unbounded module-level dict cache. torch.cuda.empty_cache() doesn't free Python references.
  fix: Use BoundedCache (OrderedDict + max_size eviction). Provide explicit clear affordance. Document that restart is the only true reset.
  verify: Run 500 prompts; memory plateaus.
  tags: [memory, cache, leak]
  legacy_id: "34"

- id: "06.05"
  phase: 6
  area: sync
  symptom: Edits don't take effect; "fixed" bug persists after restart.
  cause: Two copies of code (source repo + custom_nodes). Edited one, ComfyUI loaded the other. Or __pycache__ served stale .pyc.
  fix: Sync ALL files from source repo to custom_nodes after every edit. Clear __pycache__ in BOTH locations. Fully restart ComfyUI (re-queue does NOT reload modules).
  verify: MD5-hash every .py in both locations; all must match.
  tags: [sync, cache, pycache, restart]
  legacy_id: "1"

# ─────────────────────────────────────────────────────────────
# PHASE 07 — TENSORS, AUDIO, VIDEO
# VRAM, dtype, device, shape, audio contract, crossfades.
# ─────────────────────────────────────────────────────────────

- id: "07.01"
  phase: 7
  area: vram
  symptom: CUDA OOM when running an LLM + a video generation model sequentially even though each fits.
  cause: Models loaded at import time stay resident. Or no explicit unload between models.
  fix: Lazy-load pattern (model=None until first call). Explicit _unload_model() that del's globals + torch.cuda.empty_cache(). Sequence pipeline so each heavy model unloads before the next loads.
  verify: nvidia-smi shows VRAM freed between stages.
  tags: [vram, lazy-load, unload]
  legacy_id: "3"

- id: "07.02"
  phase: 7
  area: vram
  symptom: Device mismatch error on second run after switching CUDA device.
  cause: Cached model is on the old device.
  fix: Track device alongside model in cache; reload on device change. Always call .eval() after loading.
  verify: Switch devices; cached model reloads.
  tags: [cache, device-change]
  legacy_id: "3.4"

- id: "07.03"
  phase: 7
  area: vram
  symptom: CUDA OOM despite ComfyUI thinking it freed enough VRAM.
  cause: Manually .to("cuda") models are invisible to ComfyUI's LRU registry; it can't evict them.
  fix: Use comfy.model_management.load_model_gpu(model). Or maintain manual unload + empty_cache discipline and unload before next heavy model.
  verify: nvidia-smi shows model freed after manual unload.
  tags: [vram, lru, mm]
  legacy_id: "40"

- id: "07.04"
  phase: 7
  area: model-class
  symptom: Model loads without error but ignores conditioning input and produces garbage.
  cause: Wrong transformers class (e.g. AudioModelForConditionalGeneration instead of AudioModelMelodyForConditionalGeneration). Both load from the same checkpoint.
  fix: Read the model card. Verify class matches use case. Log type(model).__name__ on load. Watch for "unused kwargs" warnings.
  verify: Output reflects conditioning input (melody-conditioned music actually follows the melody).
  tags: [silent, wrong-class, transformers]
  legacy_id: "4"

- id: "07.05"
  phase: 7
  area: tensors
  symptom: "RuntimeError: mat1 and mat2 must have the same dtype, but got Float and Half"
  cause: Preprocessor outputs float32 but model is float16.
  fix: Cast inputs to next(model.parameters()).dtype before forward pass.
  verify: Forward pass succeeds.
  tags: [dtype, fp16]
  legacy_id: "5.1"

- id: "07.06"
  phase: 7
  area: tensors
  symptom: "Expected all tensors on same device, found cuda:0 and cpu"
  cause: Mixed device tensors.
  fix: Always align device AND dtype before tensor math. Use a helper align_tensors(reference, *tensors).
  verify: Forward pass succeeds.
  tags: [device]
  legacy_id: "5.2"

- id: "07.07"
  phase: 7
  area: tensors
  symptom: Cryptic dimension errors on audio/video processing.
  cause: Audio arrives as 1D/2D/3D depending on source. Video frames are NHWC but PyTorch wants NCHW.
  fix: Always normalize audio to 3D (B,C,T) with unsqueeze. For video, permute(0,3,1,2) for PyTorch ops, permute back to NHWC for ComfyUI.
  verify: Operation runs on all input shapes.
  tags: [audio, video, shape]
  legacy_id: "6"

- id: "07.08"
  phase: 7
  area: audio
  symptom: Aliasing artifacts after sample-rate conversion.
  cause: F.interpolate(linear) introduces high-frequency aliasing.
  fix: Use torchaudio.transforms.Resample (polyphase) with import fallback to F.interpolate.
  verify: A/B against polyphase reference.
  tags: [audio, resample]
  legacy_id: "11.1"

- id: "07.09"
  phase: 7
  area: audio
  symptom: Audible clicks at audio crossfades; visible seams at video crossfades.
  cause: Linear blend ramp.
  fix: Use raised-cosine ramp, fade = 0.5 * (1 - cos(linspace(0,1)*pi)).
  verify: Listen / view at crossfade boundary.
  tags: [crossfade]
  legacy_id: "11.2"

- id: "07.10"
  phase: 7
  area: audio
  symptom: Downstream node crashes with "'Tensor' has no attribute 'sample_rate'."
  cause: Returned a raw tensor where AUDIO dict was expected.
  fix: '"ComfyUI AUDIO type is `{\"waveform\": Tensor[B,C,T], \"sample_rate\": int}`. Always wrap. Always update sample_rate after resampling."'
  verify: All audio nodes accept and return the dict.
  tags: [audio, contract]
  legacy_id: "26"

# ─────────────────────────────────────────────────────────────
