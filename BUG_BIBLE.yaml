# ─────────────────────────────────────────────────────────────
# PHASE 09 — SUBPROCESS & NETWORK
# ffmpeg pipes, asyncio, offline fallbacks, registries.
# ─────────────────────────────────────────────────────────────

- id: "09.01"
  phase: 9
  area: asyncio
  symptom: ConnectionResetError from ProactorEventLoop crashes node output stage when browser tab disconnects.
  cause: Windows event loop raises on browser disconnect during execution.
  fix: In __init__.py, set a custom asyncio exception handler that suppresses ConnectionResetError only.
  verify: Close browser mid-run; node still completes.
  tags: [asyncio, windows, event-loop]
  legacy_id: "36"

- id: "09.02"
  phase: 9
  area: subprocess
  symptom: ffmpeg subprocess hangs forever; CPU time ~0 but process alive.
  cause: Both stdout=PIPE and stderr=PIPE filled the OS pipe buffer; ffmpeg blocks on stderr write while Python blocks on stdin write (classic pipe deadlock).
  fix: |
    stdin=PIPE; stdout=DEVNULL; stderr=NamedTemporaryFile(mode="w+b").
    Stream frames, then proc.wait(), then read temp file.
    Never use proc.communicate() for video, it buffers everything in memory.
  verify: Get-Process python* shows CPU advancing; render completes.
  tags: [subprocess, ffmpeg, deadlock, pipe]
  legacy_id: "53"

- id: "09.03"
  phase: 9
  area: network
  symptom: Flaky WiFi crashes the entire pipeline.
  cause: Hard dependency on requests + assume network up.
  fix: requests -> urllib fallback chain. Return demo data on exception with log.warning. Ship default registry data.
  verify: Disable network; node still runs with demo data.
  tags: [network, fallback, offline]
  legacy_id: "37"

- id: "09.04"
  phase: 9
  area: data
  symptom: Hardcoded camera/category/distance lists scattered across code.
  cause: No external registry.
  fix: Ship JSON registry in data/. Load once, cache in module. Validate on load. Provide reload via IS_CHANGED tied to mtime. Ship a sensible default so node works out of box.
  verify: Edit JSON; node picks up new entries on reload.
  tags: [registry, json, config]
  legacy_id: "38"

# ─────────────────────────────────────────────────────────────
# PHASE 10 — SAFETY, POOLS, RNG
# Content filters, procedural pools, statistical correctness.
# ─────────────────────────────────────────────────────────────

- id: "10.01"
  phase: 10
  area: safety
  symptom: User-supplied/scraped text reaches LLM without filtering.
  cause: No content filter layer.
  fix: Two-layer defense, keyword/regex blocklist (instant) + LLM system prompt that refuses unsafe content.
  verify: Smoke test with adversarial inputs.
  tags: [safety, filter]
  legacy_id: "7.1"

- id: "10.02"
  phase: 10
  area: safety
  symptom: Content filter substitutes [BLEEP] sentinel; breaks immersion in narrative output.
  cause: Single sentinel announces every substitution.
  fix: Replace sentinel with rotating pool of period-appropriate minced oaths (_MINCED_OATHS list of 30+ entries). Preserve original capitalization. Cycle through pool by counter.
  verify: Read 5 outputs; substitutions feel natural and not repeated.
  tags: [safety, filter, narrative, oaths]
  legacy_id: "7.4"

- id: "10.03"
  phase: 10
  area: safety
  symptom: LLM occasionally types wrong character name in dialogue body (Alice vs Bob).
  cause: Hardcoded blocklist won't generalize.
  fix: "Build authoritative roster from [VOICE: NAME] markup. Regex find capitalized 3-8 char tokens in addressable positions. Use difflib.get_close_matches against roster with cutoff=0.55. Skip COMMON_WORDS. Log every repair."
  verify: Run on archived output; warning log matches gut judgment.
  tags: [safety, names, difflib, fuzzy]
  legacy_id: "7.5"

- id: "10.04"
  phase: 10
  area: pool-sizing
  symptom: A pool of N looks plenty but collapses when filtered.
  cause: Effective size = N per filter, not N total. 9 voice presets with only 2 female = 2 effective for any female-filtered draw.
  fix: Audit pool sizing per filtered subset. Either reclassify ambiguous slots, expand the pool, or accept duplication and log POOL_EXHAUSTED loudly.
  verify: For each filter, count remaining entries vs max demand.
  tags: [pool, filter, sizing]
  legacy_id: "7.6"

- id: "10.05"
  phase: 10
  area: procedural
  symptom: Listeners notice "the same cast" across episodes; or one character missing dialogue.
  cause: Pool too small (collisions); or pool entry contains a space which breaks single-token regex parser.
  fix: |
    N first x M last must be > 1000. Pre-1931 public domain only for franchise-flavored names. No actor full names. No character compound names. All entries must be parser-compatible (no spaces). Ship CI test asserting both.
  verify: tests/cast_pool_check.py passes.
  tags: [procedural, copyright, parser, combinatorics]
  legacy_id: "64"

- id: "10.06"
  phase: 10
  area: pool-sizing
  symptom: Reviewers say "the female characters all sound the same."
  cause: Voice preset table classified only 2 of 10 as female. CAST_GENDER_POOL_EXHAUSTED on N-female episodes silently reused presets.
  fix: Reclassify androgynous slots to fill underserved subsets. Or expand pool. Or accept duplication with loud POOL_EXHAUSTED log.
  verify: Audit per-subset count vs max demand for every filter.
  tags: [tts, generation, pool, xref-10.04]
  legacy_id: "65"

- id: "10.07"
  phase: 10
  area: rng
  symptom: Probabilistic feature (easter egg, sampler, jitter) silently broken, eyeball check passes, real rate is 0% or 100%.
  cause: RNG poisoning, seed bug, frozen rng instance. Seeded module-level `random` freezes the roll for any given widget config.
  fix: |
    Use SystemRandom (OS entropy) for any probabilistic feature that must stay random across repeated runs of the same seed. Ship tests/probability_check.py with 10,000 trials, assert observed within 1.5% of target.
  verify: Test runs in <1s; PASS before commit.
  tags: [rng, statistical, test, system-random]
  legacy_id: "10.3"

# ─────────────────────────────────────────────────────────────
# PHASE 11 — LLM-SPECIFIC
# Token budgets, revision passes, attention backends, arc scoring.
# ─────────────────────────────────────────────────────────────

- id: "11.01"
  phase: 11
  area: llm
  symptom: External reviewers consistently flag "weak ending" across many episodes; prompt fixes don't help.
  cause: Revision-pass token budget sized from `target_words` instead of actual draft length. Revision decapitates Scene 4 mid-word; downstream similarity/length checks pass within tolerance.
  fix: |
    draft_token_estimate = int(len(draft_text) / 3.5)
    revision_tokens = max(int(draft_token_estimate * 1.25), int(target_words * 2.0), 2048)
    revision_tokens = min(revision_tokens, 8192)
    Log the budget so the bug is visible next time.
  verify: Compare revision output character count to draft; ratio should be ~1.0, not 0.75.
  tags: [llm, tokens, revision, critique]
  legacy_id: "61"

- id: "11.02"
  phase: 11
  area: llm
  symptom: LLM generation times out mid-outline on long passes at ~300s.
  cause: SDPA attention runs at ~2 tok/sec on large context. 600 token budget * 2 tok/sec = 300s wall, exactly at the timeout. Silent failure at the boundary.
  fix: |
    Budget the wall from actual backend throughput, not hopeful estimates.
    For SDPA on sm_120, assume ~2 tok/sec worst case.
    Lower per-pass token budget (e.g. 600 -> 450) AND raise timeout wall (300s -> 480s) so you clear the boundary from both sides.
    Log tokens-generated, budget, and wall-time per pass.
  verify: No more timeout failures at the outline stage; logs show wall time < budget with headroom.
  tags: [llm, sdpa, timeout, token-budget, wall-time]
  legacy_id: ""
- id: "11.03"
  phase: 11
  area: llm
  symptom: Bookend rewrite pass invents an ending that contradicts the middle acts.
  cause: Phase B rewrite sees only opening and closing; has no context for what actually happened in the middle.
  fix: |
    Plot Spine Injection. Before the rewrite, extract the middle region, pull scene markers and voice lines, truncate to ~50 words, inject as "MIDDLE EVENTS (do not contradict)" in the rewrite prompt.
    Add directive: "Do NOT contradict the MIDDLE EVENTS summary below."
  verify: Read 5 rewritten endings; none contradict the middle-act content.
  tags: [llm, arc-enhancer, plot-spine, rewrite, continuity]
  legacy_id: ""
- id: "11.04"
  phase: 11
  area: llm
  symptom: Arc quality is inconsistent across episodes but no one can say why.
  cause: No structural telemetry. Nobody can see what a "good" arc looks like vs a "bad" one.
  fix: |
    Phase A Structural Coherence Scoring. Before any rewrite, score the draft across 5 checks:
      1. truncation guard (draft not cut off mid-word)
      2. strong_scene (>= 4 distinct voices somewhere)
      3. payoff (capitalized keyword overlap between opening and closing)
      4. echo (shared words > 4 chars, overlap >= 2)
      5. epilogue (ANNOUNCER present in last 500 chars)
    Log score and all 5 check values per episode. Log the echo phrase that bridges opening to closing.
  verify: Over N episodes, score distribution is visible in logs; you can grep bad runs by score < 3.
  tags: [llm, arc-enhancer, scoring, telemetry, observability]
  legacy_id: ""
- id: "11.05"
  phase: 11
  area: attention
  symptom: Startup log complains about missing Flash Attention 2; next AI session wastes 30 minutes trying to install it.
  cause: Generic "flash_attn not found" warning doesn't say WHY it's not available or whether it's fixable.
  fix: |
    Replace generic warning with platform-exact message:
    "Flash Attention 2 NOT AVAILABLE - no prebuilt wheel exists for torch <ver> + CUDA <ver> + <arch> on <os>. SageAttention + SDPA active. Performance unaffected. Do not attempt install."
    The "Do not attempt install" line is the critical part - it stops the next contributor from chasing the wrong wheel.
  verify: Log message is unambiguous; next session does not attempt FA2 install.
  tags: [attention, flash-attention, logging, clarity, xref-02.03, xphase-02]
  legacy_id: ""
- id: "11.06"
  phase: 11
  area: attention
  symptom: Downstream input formatting crashes with slice or dict errors on `apply_chat_template`.
  cause: Migrating from a multimodal LLM (multimodal `AutoProcessor`) to standard models like a standard text LLM (flat `AutoTokenizer`) requires different chat structural types. MultimodalProcessor requires `{"role": "user", "content": [{"type": "text", "text": prompt}]}` while normal tokenizers expect `{"role": "user", "content": prompt}`.
  fix: |
    Add dynamic checks when building chat pipelines `is_multimodal = "vision" in model_id.lower()`.
    Conditionally wrap the content arrays depending on model type.
  verify: Both multimodal models and standard tokens process standard prompts without KeyError or TypeErrors.
  tags: [tokenizer, autoprocessor, multimodal, apply_chat_template]
  legacy_id: ""
- id: "11.07"
  phase: 11
  area: performance
  symptom: 4GB GPUs "slow to a crawl" during story generation despite no direct OOM.
  cause: Multi-pass LLM cycles (Critique, Open-Close, Arc Enhancer) force the model to stay active over multiple inference windows. On 4GB cards, the cumulative KV cache and model offloading overhead over 5+ passes causes extreme bus latency.
  fix: Implement an "Optimization Profile" (Obsidian/One-Shot) that defaults all iterative passes to OFF. One prompt, one script, zero offload cycles.
  verify: 4GB script generation completes in a single window without the "crawling" effect found in multi-pass runs.
  tags: [vram, 4gb, obsidian, performance, offloading]
  legacy_id: ""
- id: "11.08"
  phase: 11
  area: llm
  symptom: ScriptWriter DONE line shows expected characters list (e.g. "ANNOUNCER, DRACULA MALONE, TITLE, ...") but dialogue parser only recovers 0-2 lines instead of 20+. TITLE string is listed as a speaking character.
  cause: Writer prompt addition required `TITLE: <name>` as first output line. Both streaming detector and post-stream parser match `NAME: text` shape as dialogue, and neither blacklist contained `TITLE`. Every title line got booked as character TITLE speaking the title text, polluting cast, eating word budget, nudging self-critique into deletion.
  fix: |
    (1) Add `"TITLE"` to `_DIALOGUE_FALSE_POSITIVES` frozenset (line ~1545).
    (2) Add `"TITLE"` to streaming heartbeat's inline false-positive tuple (line ~1885).
    (3) Before `_parse_script`, extract `TITLE:` line via `_extract_title_from_script_text`, strip all `TITLE:` lines from script_text with regex, inject extracted value into title-resolution block. Log `TITLE_STRIP | extracted=...`.
  verify: Next run shows `TITLE_STRIP | extracted='...'` AND ScriptWriter DONE's Characters list does NOT contain `TITLE`. Filename still varies. `TITLE_TRACE source=llm` still resolves correctly.
  tags: [title, dialogue-parser, false-positive, regression, cast-roster]
  legacy_id: BUG-LOCAL-037

- id: "11.09"
  phase: 11
  area: llm
  symptom: BatchBark finds 0 dialogue lines despite Grammarian reporting 20+. Bark bus renders only ANNOUNCER with no character dialogue. Silent 20-line drop between parser and BatchBark.
  cause: |
    Three compounding gaps in FORMAT_NORM / parser chain for Mistral's bare `NAME: text` dialogue style:
    (1) FORMAT_NORM skip heuristic treated `canonical_count >= 5` raw `NAME:` matches as already canonical; skipped LLM rewrite. But `_parse_script` had no pattern for bare `NAME: text` (only bracket tags).
    (2) `_parse_script` bare `NAME:` lines hit "treat as direction" fallback and were lost.
    (3) Permissive 2B-fallback only fired if dialogue_count == 0; one stray malformed tag short-circuited recovery of 20+ legitimate lines.
  fix: |
    (1) Add diagnostic `DIALOGUE_TRACK: 07_AFTER_PARSE | count=N` checkpoint right after parser (makes silent drop visible).
    (2) Tighten FORMAT_NORM skip heuristic: require `has_dialogue AND has_scenes AND has_cast` (all three, not just one).
    (3) Add v5 VOICE pattern (bare `NAME: dialogue`) as first-class regex before fallback, registers as `{"type":"dialogue"}` token directly.
    (4) Loosen 2B-fallback guard: trigger on `dialogue_count < 3 AND raw-text has 5+ NAME: matches` instead of just `== 0`.
  verify: Next run shows `DIALOGUE_TRACK: 07_AFTER_PARSE | count=N` matching streaming count. `[BatchBark] Found N dialogue lines` shows N >= 15 for normal run (was 0 before). MP4 audio contains character dialogue.
  tags: [format-norm, parser, bare-dialogue, mistral, skip-heuristic, fallback]
  legacy_id: BUG-LOCAL-038

- id: "11.10"
  phase: 11
  area: llm
  symptom: Title extracted as `'** Bioluminal Tide'` (leading markdown bold wrapper leaks). Every downstream consumer carries the cosmetic garbage in logs, filenames, overlays.
  cause: LLM emitted `TITLE: **Bioluminal Tide**` (markdown bold wrapping the value). `_RE_TITLE_LINE` only strips `**` prefix BEFORE word TITLE and suffix AFTER trailing quote. Lazy capture `(.+?)` grabbed leading `**` of the value and retained it. Post-processing only did `strip()` + quote-strip, no markdown-wrapper strip.
  fix: In `_extract_title_from_script_text`, add regex substitutions right after quote-strip to peel leading/trailing `*`/`_` runs (1-3 chars) plus surrounding whitespace, then re-run quote-strip so nested cases like `**"Title"**` land clean. Add empty-result guard so `TITLE: ****` residue returns `""` not invalid.
  verify: Next run's log shows `TITLE_TRACE ... resolved='Bioluminal Tide'` (no leading `**`). Existing unwrapped titles unchanged. Filename varies per episode (BUG-LOCAL-035 regression guard).
  tags: [title-extraction, regex, markdown, post-processing, cosmetic]
  legacy_id: BUG-LOCAL-039

- id: "11.11"
  phase: 11
  area: llm
  symptom: "`ValueError: Failed to parse production plan JSON. Repair pass logged Expecting property name enclosed in double quotes: line 13 column 42.` Director produced 3491-char output but json.loads() rejected it."
  cause: Mistral emitted JavaScript-style `//` line comments inside JSON values, e.g. `"v2/en_speaker_8", // Reserved for LEMMY`. Python `json.loads()` does not accept comments. Existing repair pass stripped trailing commas and tried brace-closure but never stripped comments, so parse always failed at first `//`. Truncation (open braces) was secondary issue masked by comment failure.
  fix: |
    Add `_strip_json_comments()` state-machine parser that removes `// ...` to end-of-line only outside quoted strings (preserving URL-like values such as `v2/en_speaker_8`). Wire into `_extract_json` at three points:
    (1) after first raw `json.loads()` fails, strip comments + trailing commas and retry.
    (2) before truncation-repair brace closure.
    (3) in last-resort brace-scan path. Run before trailing-comma stripping so `value, // comment\n}` collapses cleanly.
  verify: Next run shows `[LLMDirector] Plan: N voices, N SFX cues, N music cues` instead of FATAL. Runs with clean JSON (no comments) hit first `json.loads()` and skip stripper entirely — zero perf cost on clean path.
  tags: [director, json-parse, llm-output, comments, mistral, truncation, llm]
  legacy_id: BUG-LOCAL-040

# ─────────────────────────────────────────────────────────────
# PHASE 12 — REGRESSION, GIT, HANDOFF
# Testing, autonomy, git hygiene, session continuity, repo cleanliness.
# ─────────────────────────────────────────────────────────────

- id: "12.01"
  phase: 12
  area: testing
  symptom: Iteration is slow because every test requires a full ComfyUI restart.
  cause: Logic intertwined with ComfyUI wiring.
  fix: Extract pure functions into separate module with no ComfyUI dependency. Test with pytest. Use ast.parse for syntax (0.1s). Reserve restart for integration only.
  verify: pytest runs in 1-2s.
  tags: [test, ast, pure-fn]
  legacy_id: "39"

- id: "12.02"
  phase: 12
  area: regression
  symptom: '"Done" was reported but next ComfyUI restart shows stale files / missing widgets / wrong paths.'
  cause: Skipped regression checklist.
  fix: |
    Run all 15 steps after EVERY code change:
    1. Sync ALL changed files to custom_nodes
    2. Clear __pycache__ in BOTH locations
    3. Hash-compare every .py file
    4. Hash-compare README/requirements/workflow JSONs
    5. ast.parse every .py
    6. Grep for dead references
    7. Verify cross-imports resolve
    8. Widget audit (INPUT_TYPES vs widgets_values)
    9. Workflow JSON internal consistency
    10. Commit and push (Start-Job/batch on Windows)
    11. Verify push landed on remote
    12. Restart ComfyUI fully and run end-to-end
    13. Statistical RNG harness if RNG-adjacent
    14. GitHub HEAD lockstep verification
    15. Scan for 0-byte/BOM/missing registrations on remote
  verify: Every step passes before declaring done.
  tags: [regression, checklist]
  legacy_id: "10"

- id: "12.03"
  phase: 12
  area: deps
  symptom: Removed library still referenced by code/widgets/workflows after the swap.
  cause: Half-removed dependency.
  fix: |
    1. Remove imports/loaders/inference/unload code
    2. Remove from requirements.txt (if no other node uses)
    3. Update README
    4. Grep entire codebase case-insensitive
    5. Distinguish code refs (bugs) from comment/changelog refs (OK)
    6. Remove related widgets
    7. Update widgets_values in ALL workflow JSONs
    8. Test pipeline end-to-end without old dep installed
  verify: Pipeline runs after old dep uninstalled.
  tags: [removal, deps, cleanup]
  legacy_id: "14"

- id: "12.04"
  phase: 12
  area: ai-autonomy
  symptom: AI assistant relays "you need to run pip install X" instead of doing it.
  cause: Asking the user to do work the AI can do itself.
  fix: |
    Golden rule, if a senior pair-programmer would just do it, the AI should just do it. Install packages, fix errors, sync files, run regression, commit, push, batch related changes, report summary at end. Only escalate when a decision is required or a wall is hit (auth prompts, etc.).
  verify: Number of "please run this" handoffs trends toward zero.
  tags: [autonomy, ux, workflow]
  legacy_id: "16"

- id: "12.05"
  phase: 12
  area: pipeline-sync
  symptom: Same parameter has different defaults at parser/prompt/renderer layers.
  cause: Multi-layer pipeline; one layer updated, others not.
  fix: Grep for the value across the whole codebase before changing it. Add a hard cap at the rendering layer as a safety net (`min(value, MAX)`).
  verify: All layers report same value.
  tags: [pipeline, sync, multi-layer]
  legacy_id: "58"

- id: "12.06"
  phase: 12
  area: workflow-json
  symptom: Two nodes silently share an ID; only one executes.
  cause: last_node_id was lower than an actual node ID after manual JSON edit; UI assigned colliding ID.
  fix: Always set last_node_id = max(node IDs) + 1 after manual edits. Same for last_link_id.
  verify: All node IDs unique; counters >= max.
  tags: [json, counter, collision, workflow-json]
  legacy_id: "18"

- id: "12.07"
  phase: 12
  area: workflow-json
  symptom: Connection line missing in ComfyUI even though links[] entry exists.
  cause: Link cross-references must agree in 3 places, links[] array, source node's outputs[slot].links, target node's inputs[slot].link. Any mismatch silently drops the connection.
  fix: Maintain all three references when editing JSON. Use a builder pattern.
  verify: validate_links() script checks all three places.
  tags: [json, links, integrity, workflow-json]
  legacy_id: "18.3"

- id: "12.08"
  phase: 12
  area: workflow-json
  symptom: Workflow JSON is corrupt and hand-editing isn't fixing it.
  cause: Compounded edits.
  fix: Nuclear option, rebuild from blank canvas in the UI, save fresh, diff against broken version.
  verify: Fresh JSON loads cleanly.
  tags: [json, recovery, workflow-json]
  legacy_id: "19.4"

- id: "12.09"
  phase: 12
  area: git
  symptom: git command hangs forever in PowerShell.
  cause: Windows Credential Manager opens GUI prompt AI cannot interact with. Or Git LFS filter (process=git-lfs filter-process) hangs every git op even on non-LFS repos. Or Windows Defender locks git.exe child processes.
