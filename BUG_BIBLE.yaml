- id: "12.26"
  phase: 12
  area: huggingface
  symptom: |
    cache_dir dirname() Miscount (the custom-node path trap).
    `from_pretrained(model_id, local_files_only=True, cache_dir=...)`
    fails with "Cannot find the requested files in the disk cache"
    even though the model is fully downloaded and the symlinks are
    intact. Hub fallback triggers a redundant multi-GB internet
    download on every single run.
  cause: |
    Using `os.path.dirname()` chains to navigate from `__file__` to the models
    directory is fragile and error-prone. The typical custom node sits at:
      `ComfyUI/custom_nodes/MyPack/nodes/my_node.py`
    Three dirname() calls resolve to `custom_nodes/` (wrong), not `ComfyUI/`.
    The computed `cache_dir` points to a non-existent `custom_nodes/models/` path,
    so `local_files_only=True` always fails and the Hub fallback fires.
    This is invisible because the Hub fallback silently succeeds (downloading to
    the WRONG location) and the pipeline appears to "work" — just with a 10-minute
    network penalty every startup.
  fix: |
    NEVER use dirname() chains to compute cache_dir. Instead, derive it from
    the HF_HOME environment variable (set in prestartup_script.py):
      cache_dir = os.path.join(
          os.environ.get("HF_HOME", os.path.expanduser("~/.cache/huggingface")),
          "hub"
      )
    This resolves correctly regardless of the node's filesystem depth.
    Apply to EVERY `from_pretrained()` call: tokenizer, model, processor, CustomAudioModel,
    AudioModelForConditionalGeneration, AutoProcessor, etc.
  verify: |
    Add a log line: `log.info("cache_dir resolved to: %s", cache_dir_path)`.
    Confirm it shows `ComfyUI/models/huggingface/hub`, NOT `custom_nodes/models/...`.
    Confirm "loaded from cache (no HTTP checks)" appears in logs with zero "Fetching" lines.
  tags: [cache_dir, dirname, paths, huggingface, from_pretrained, windows, xphase-02]
  legacy_id: ""

- id: "12.27"
  phase: 12
  area: huggingface
  symptom: |
    Windows Symlink Slash Direction in HF Hub Cache. Model files
    exist in the blobs/ directory with correct hashes, but
    `from_pretrained(local_files_only=True)` cannot find them. The
    snapshots/ directory contains symlinks that appear valid in
    Explorer but fail when the transformers library tries to resolve
    them.
  cause: |
    The Hugging Face Hub library creates symlinks in `snapshots/<hash>/` pointing
    to `../../blobs/<blob_hash>`. On Windows, the `huggingface_hub` download code
    creates these with backslashes (`..\..\blobs\<hash>`), but if a "fix" script
    rewrites them to forward slashes (`../../blobs/<hash>`), the Windows symlink
    target resolution fails silently. The file "exists" as a symlink but cannot
    be opened, so `transformers` reports it as missing.
    Conversely, on WSL or Git Bash, forward slashes work but backslashes break.
    The slash direction must match the OS that CREATED the symlink.
  fix: |
    On native Windows: always use backslashes in symlink targets.
    On WSL/Linux: always use forward slashes.
    Never "fix" symlinks by normalizing slashes without testing `os.path.exists()`
    on the RESOLVED path afterward.
    Best practice: use `os.readlink()` to get the current target, then
    `os.path.exists(os.path.join(symlink_dir, target))` to validate resolution.
  verify: |
    For each file in snapshots/<hash>/:
      target = os.readlink(filepath)
      resolved = os.path.join(os.path.dirname(filepath), target)
      assert os.path.exists(resolved), f"Broken: {filepath} -> {target}"
  tags: [windows, symlink, huggingface, cache, blobs, slashes, xphase-02]
  legacy_id: ""

- id: "12.28"
  phase: 12
  area: huggingface
  symptom: |
    Global HF Cache Duplication (the 208 GB trap). Disk usage grows
    unexpectedly. Model downloads appear to succeed but take twice as
    long as expected. `C:\Users\<user>\.cache\huggingface\hub\`
    contains full copies of models that also exist in the project's
    custom HF_HOME directory.
  cause: |
    When `cache_dir` is not explicitly passed to `from_pretrained()`, the library
    falls back to the global default (`~/.cache/huggingface/hub/`). Even when
    `HF_HOME` is correctly set via environment variable, certain code paths
    (especially Hub fallback after `local_files_only=True` failure) ignore the
    env var and download to the global cache. Over time, this silently duplicates
    every model — 208 GB of wasted space was observed in one real-world case.
    Additionally, `.lock` and `.incomplete` files from failed/interrupted downloads
    accumulate in the global cache and can deadlock subsequent download attempts.
  fix: |
    1. Pass `cache_dir` explicitly in EVERY `from_pretrained()` call (see 12.26).
    2. After hardening, audit and purge the global cache:
       `shutil.rmtree(os.path.expanduser("~/.cache/huggingface/hub/models--*"))`
    3. Periodically scan for `.lock` and `.incomplete` files in both caches:
       `Get-ChildItem -Recurse -Include *.lock,*.incomplete -Force | Remove-Item`
    4. Never assume HF_HOME alone prevents global cache writes.
  verify: |
    After a full pipeline run, check:
      `Get-ChildItem ~/.cache/huggingface/hub -Directory | Measure-Object`
    Count should be 0. All models load from the project's HF_HOME/hub/ only.
  tags: [huggingface, cache, disk, duplication, cleanup, windows, xphase-02]
  legacy_id: ""

- id: "12.29"
  phase: 12
  area: audio
  symptom: |
    Silent Sample-Rate Mismatch (the 2/3 speed bug). Audio from a
    secondary model (e.g. an audio synthesis model at 32 kHz) plays
    at the wrong speed when mixed into a primary audio bus (e.g.
    48 kHz). Opening theme sounds slow and pitched down. No error is
    raised.
  cause: |
    The assembler node stitches waveform tensors by concatenation without checking
    that all inputs share the same sample rate. When a 32 kHz waveform is treated
    as 48 kHz, it plays at 2/3 speed (32000/48000 = 0.667). The math is silent —
    no shape error, no dtype error, no device error. The only symptom is audible.
  fix: |
    Every audio input path must resample to the target bus rate before mixing.
    Use `torchaudio.functional.resample(waveform, orig_sr, target_sr)` with a
    numpy `scipy.signal.resample_poly` fallback. Add a log line:
      `log.info("Resampled %dHz -> %dHz", orig_sr, target_sr)`
    Include a same-rate no-op path that skips the resample when rates already match.
  verify: |
    an audio synthesis model outputs at 32 kHz. Main bus is 48 kHz. Resampled audio plays at
    correct speed and pitch. Log shows "Resampled 32000Hz -> 48000Hz".
  tags: [audio, resample, sample-rate, silent, audio-model, assembler, xphase-07]
  legacy_id: ""

- id: "12.30"
  phase: 12
  area: deps
  symptom: |
    audiocraft Windows Install Trap (av + spacy pin conflict).
    Attempting to install `audiocraft` (Meta's audio synthesis
    library) on Windows + Python 3.12 fails with dependency
    conflicts. Even if forced, it breaks existing packages in the
    ComfyUI venv.
  cause: |
    The library pins `av==11.0.0` and `spacy==3.5.2`, both of which conflict
    with ComfyUI's existing dependency tree. The `av` pin requires C compilation
    (MSVC) which most users don't have. Even when installed, the spacy pin
    downgrades tokenizers, breaking transformers.
  fix: |
    Do NOT use the standalone complex library. Use `transformers.AudioModelForConditionalGeneration` +
    `AutoProcessor` instead — both are already installed via the main transformers
    package. Same model weights, same output quality, zero extra dependencies.
    For AudioLDM/AudioGen, similarly use the transformers-native API.
  verify: |
    `pip show the_complex_lib` returns "not installed". an audio synthesis model generation works
    via transformers API. No MSVC or spacy required.
  tags: [dependencies, audio-model, windows, av, spacy, python312, xphase-02]
  legacy_id: ""

- id: "12.31"
  phase: 12
  area: deprecation
  symptom: |
    Implicit repo_id Migration Warnings (TTS library). The terminal
    spams deprecation/migration warnings such as "Implicit repo_id is
    deprecated" during model initialization, polluting the clean boot
    logs.
  cause: |
    The `my_tts_lib.Pipeline` (or similar HuggingFace hub consumer) changed its default
    behavior to warn when relying on implicit language code mapping instead of
    an explicit repository identifier.
  fix: |
    Explicitly declare the target repository even if it's the default. For example,
    instantiate with `KPipeline(lang_code='b', repo_id='org/Model-82M')`.
    This locks the dependency resolution path and suppresses the warning, keeping
    the startup log clean.
  verify: |
    Restart ComfyUI and run a generation. The text console remains clean with zero
    deprecation warnings.
  tags: [tts, huggingface, deprecation, warnings, repo_id, clean-boot, xphase-02]
  legacy_id: ""

- id: "12.32"
  phase: 12
  area: telemetry
  symptom: |
    Telemetry Case-Sensitivity and Pre-flight CPU Bottlenecks. The
    VRAM Telemetry HUD tracks some models correctly but misses new
    ones (like "Model 12B"). At the same time, the `VoiceHealth`
    pre-flight check executes extremely slowly, bottlenecking the
    pipeline boot.
  cause: |
    1. The telemetry tracker matched substring sizes (e.g., "12b") case-sensitively,
       so "12B" failed to trigger the model detection logic.
    2. The `VoiceHealth` check instantiated its diagnostic audio/text tensors using
       PyTorch defaults without explicitly moving them to the active device. They
       ran on the CPU instead of the GPU.
  fix: |
    1. Always normalize telemetry strings with `.lower()` before substring matching
       (e.g., `if "12b" in model_id.lower():`).
    2. Explicitly append `.to("cuda")` (or the dynamic detected device) to all
       health check tensors to force hardware acceleration during pre-flight.
  verify: |
    Telemetry captures Model 12B in its output overlay. VoiceHealth checks
    complete in <4.0 seconds.
  tags: [telemetry, vram, case-sensitive, cuda, health-check, bottleneck]
  legacy_id: ""


- id: "12.33"
  phase: 12
  area: vram
  symptom: |
    LLM generation stalls for 60-180 seconds after weights finish loading before
    the first token appears. Token throughput drops to 0.5-1.5 tok/s (should be
    13-16 tok/s). Peak VRAM spikes to 2x the model weight size (e.g. 25 GB for
    a 7 GB 4-bit model). VRAM_CEILING_EXCEEDED logged on every pass.
  cause: |
    The input prompt is far larger than the model's configured context window.
    NeMo 12B (and similar 128k-native models) have max_position_embeddings
    constrained at load time (e.g. to 2048 tokens) to limit KV cache VRAM.
    However, transformers does NOT enforce this at the input level — it still
    accepts a 10,000-token prompt and pre-fills the FULL unrestricted KV cache,
    causing a massive VRAM spike and a proportionally long pre-fill stall before
    any tokens are generated. This is silent: no error, no warning, just a hang.
  fix: |
    After tokenizing the prompt, check input length and truncate explicitly
    before calling model.generate():
      _context_cap = _LLM_CACHE.get("context_cap", 8192)
      _max_input_tokens = max(64, _context_cap - max_new_tokens)
      _input_len = inputs["input_ids"].shape[-1]
      if _input_len > _max_input_tokens:
          _trunc = _input_len - _max_input_tokens
          inputs["input_ids"] = inputs["input_ids"][:, _trunc:]
          if "attention_mask" in inputs:
              inputs["attention_mask"] = inputs["attention_mask"][:, _trunc:]
          log.info("Prompt truncated: %d -> %d tokens", _input_len, _max_input_tokens)
    Also add a 1-token warmup generate() call right after model load to front-load
    SDPA/BitsAndBytes CUDA kernel JIT compilation, eliminating a secondary cold-start
    stall on the very first real generate() call.
  verify: |
    Runtime log shows "PROMPT_GUARD: Truncated N -> M tokens" on the first pass.
    Token throughput immediately hits 13+ tok/s (no pre-fill stall).
    Peak VRAM stays within the sovereignty buffer (e.g. < 9 GB for NeMo 12B 4-bit).
    VRAM_CEILING_EXCEEDED no longer appears in logs.
  tags: [vram, llm, prompt-length, context-cap, prefill, stall, nemo, bitsandbytes, warmup, xphase-11]
  legacy_id: ""

- id: "12.34"
  phase: 12
  area: git
  symptom: |
    AI assistant attempts to push from sandbox/Cowork environment, encounters .git/index.lock
    file that cannot be removed due to sandbox permissions, process times out after 30-60 seconds,
    and hands back a PowerShell block for manual execution.
  cause: |
    Sandboxed git operations (Bash, MCP PowerShell) cannot acquire or release filesystem locks
    reliably on Windows hosts. Even successful file writes leave stale lock state. The git command
    then blocks indefinitely waiting for lock release, followed by a timeout.
  fix: |
    Do not have the AI attempt git push from the sandbox. Instead, AI should generate a copy-paste
    PowerShell block with explicit `cd`, `git add <files>`, `git commit -m "msg"`, and `git push`.
    User pastes and executes in 10-15 seconds. This saves 3+ minutes per push vs sandbox timeout
    retry cycles.
  verify: |
    Push succeeds in local PowerShell within 15 seconds. Lockstep check (local HEAD == origin HEAD)
    confirms remote state updated correctly. No .git/index.lock remains after push.
  tags: [git, push, sandbox, windows, permissions, lock, handoff]
  legacy_id: ""

- id: "12.35"
  phase: 12
  area: maintenance
  symptom: |
    Bug Bible entry added or edited but README entry count is stale, pytest test
    file has no matching test or exclusion note, or README coverage table is missing
    the new phase/area. Drift between the three files causes AI assistants to miss
    checks or report wrong totals.
  cause: |
    The Three-File Contract was not enforced. Any change to BUG_BIBLE.yaml must be
    mirrored in README.md (entry count, coverage table) and in
    tests/bug_bible_regression.py (new test or documented exclusion). Forgetting
    any one of the three creates silent drift.
  fix: |
    Every commit that touches BUG_BIBLE.yaml must also touch README.md and
    tests/bug_bible_regression.py. Verify sync with:
      1. Count entries in YAML: grep -c "^- id:" BUG_BIBLE.yaml
      2. Confirm README cites the same count.
      3. Confirm test file covers the entry (test function or exclusion comment).
    Add this as a pre-commit mental checklist or scripted check.
  verify: |
    grep -c "^- id:" BUG_BIBLE.yaml matches the count in README.md. Every id in
    the YAML has either a corresponding test function or a documented exclusion
    comment in bug_bible_regression.py.
  tags: [maintenance, three-file-contract, readme, pytest, sync, drift]
  legacy_id: ""

- id: "12.36"
  phase: 12
  area: testing
  symptom: |
    Regression test suite fails with "0-byte Python files found: __init__.py" or "Popen without cleanup" on files inside internal virtual environment folders.
  cause: |
    Automated directory traversals (like os.walk) collecting `.py` files for AST scanning or static analysis don't naturally exclude local environment directories like `.venv` or `venv`. Python packaging and downloaded wheels often contain 0-byte init modules and varied coding styles that violate strict custom node rules.
  fix: |
    Explicitly exclude `.venv` and `venv` from any `os.walk` or glob list when collecting files for testing or sanity checking. Example: `dirs[:] = [d for d in dirs if d not in ("__pycache__", ".git", ".venv", "venv")]`.
  verify: |
    Running static regression tests against the custom node project with an active `.venv` works cleanly and yields no false positives from third party library internals.
  tags: [testing, os-walk, venv, false-positives, static-analysis]
  legacy_id: ""

- id: "02.14"
  phase: 2
  area: huggingface
  symptom: |
    Loading a single-file `.ckpt` (SD 1.5 / SDXL) via
    `diffusers.StableDiffusionPipeline.from_single_file()` from inside a
    ComfyUI sidecar subprocess (`stdout=PIPE, stderr=PIPE`) on Windows
    with offline-first rules produces one of four OSError/UnpicklingError
    stacks depending on which layer fires first:
      1. `_pickle.UnpicklingError: Weights only load failed ...
         pytorch_lightning.callbacks.model_checkpoint.ModelCheckpoint
         was not an allowed global`
      2. `ModuleNotFoundError: No module named 'pytorch_lightning'`
      3. `OSError: [Errno 22] Invalid argument` inside
         `snapshot_download -> thread_map -> tqdm.fp_write`
      4. `OSError: [Errno 22] Invalid argument` inside
         `tqdm.std.print_status` during pipeline inference step progress.
  cause: |
    Four stacked issues fire in sequence when the classic diffusers
    single-file load path runs from a stdout-piped subprocess:
      1. PyTorch 2.6+ changed `torch.load` default to `weights_only=True`;
         legacy `.ckpt` pickles embed `pytorch_lightning` class metadata.
      2. `pytorch_lightning` is not a hard dependency of diffusers; if
         it is not installed, even `weights_only=False` fails to resolve
         the class during unpickle.
      3. diffusers falls back to `snapshot_download` to fetch the
         diffusers-format model config from the HF Hub, violating any
         `100%-local/offline` constraint and failing WinError 22 when
         HF_HUB is unreachable or sandboxed.
      4. Both the loading-phase and the inference-phase tqdm progress
         bars write to a PIPE'd stdout that the parent process (ComfyUI)
         never drains. Once the pipe backs up, every subsequent write
         raises WinError 22.
  fix: |
    Apply all four in `_default_sd15_loader()` (or equivalent sidecar
    loader entrypoint):
      1. Monkey-patch `torch.load` to force `weights_only=False` via
         `kwargs["weights_only"] = False` (override, not `setdefault`;
         diffusers passes `weights_only=True` explicitly).
      2. Inject a 3-level `pytorch_lightning` shim into `sys.modules`
         with a placeholder `_ShimModelCheckpoint` class before load,
         and pop it after load.
      3. Bundle `configs/v1-inference.yaml` (CompVis, MIT) next to the
         loader and pass `original_config=<local path>` +
         `local_files_only=True` so diffusers skips the HF Hub entirely.
      4. Silence tqdm on both paths:
           - `diffusers.utils.logging.disable_progress_bar()`
           - env: `HF_HUB_DISABLE_PROGRESS_BARS=1`,
             `TRANSFORMERS_VERBOSITY=error`,
             `DIFFUSERS_VERBOSITY=error`
           - After `pipe = pipe.to(device)`:
             `pipe.set_progress_bar_config(disable=True)`
    Also: make the outer exception handler write the full traceback to
    disk (e.g. `io/hyworld_in/<job>/anchor_error.log`) -- the `[Errno 22]`
    alone loses every diagnostic signal.
  verify: |
    In a stdout-piped sidecar subprocess, load SD 1.5 once. A successful
    first run (cold-load) takes ~8-12 s; a warm subsequent run with the
    same pipe ~3-5 s per 512x512 inference. No `[Errno 22]`, no
    `UnpicklingError`, no `ModuleNotFoundError` in the error log.
    Regression: grep the sidecar source for the four hooks above -- all
    four must be present, not just one or two.
  tags: [sd15, sdxl, ckpt, diffusers, weights-only, pytorch-lightning, hf-hub-offline, tqdm-pipe, winerror22, subprocess, windows]
  legacy_id: BUG-LOCAL-043

