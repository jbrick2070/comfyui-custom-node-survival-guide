- id: "08.06"
  phase: 8
  area: output_node
  symptom: |
    Pure data-flow placeholder nodes (CharacterForge, ScenePainter,
    VisualCompositor, etc.) are flagged as output nodes by static
    regression tests, even though they only return in-memory tensors
    or strings.
  cause: |
    OUTPUT_NODE = True was copy-pasted onto every node class in the
    pack, including data-flow placeholders that never actually write
    files to disk. The flag changes ComfyUI's execution behavior
    (forces evaluation, exposes preview UI, triggers Save semantics)
    in ways that misrepresent these nodes' role and break path-safety
    checks.
  fix: |
    Reserve OUTPUT_NODE = True for nodes whose execute() actually
    writes a file the user is meant to retrieve (mp4, png, wav,
    json). Data-flow nodes that just return tensors/dicts to
    downstream nodes should NOT carry the flag. Run a regression
    grep on every OUTPUT_NODE-flagged file confirming there is at
    least one folder_paths.get_output_directory() / write call.
  verify: |
    Bug Bible regression test_output_nodes_use_folder_paths passes;
    grep `OUTPUT_NODE = True` and confirm each match also writes a
    real artifact.
  tags: [output_node, placeholder, registration, dataflow]
  legacy_id: BUG-LOCAL-001

- id: "04.07"
  phase: 4
  area: workflow-json
  symptom: |
    POST /prompt returns HTTP 400 because widget values arrive in
    the wrong slots: numeric values land in string params, dropdown
    values land in the wrong dropdown, etc. Workflow renders fine in
    the UI but breaks on programmatic invocation.
  cause: |
    Workflow→API converters that walk widgets_values positionally
    against INPUT_TYPES often forget that ComfyUI EXCLUDES linked
    inputs (those wired to another node's output) from
    widgets_values entirely. If the converter does not skip linked
    inputs, every value after the first link is shifted.
  fix: |
    Build a `linked_set` of input names that have an incoming wire
    in the workflow JSON's `links` array. When mapping
    widgets_values positionally against INPUT_TYPES order, skip
    every name that is in `linked_set`. Linked params get filled
    from the link map instead.
  verify: |
    Programmatic submission of the workflow JSON via
    /prompt returns HTTP 200 with no value_not_in_list /
    invalid_input_type errors, and the realized inputs match what
    the UI shows.
  tags: [widget-drift, workflow-to-api, linked-inputs, positional]
  legacy_id: BUG-LOCAL-003

- id: "04.08"
  phase: 4
  area: combo
  symptom: |
    POST /prompt rejects a dropdown value with
    `value_not_in_list: '[icon] standard (12 min)' not in
    ['[EMOJI] standard (12 min)', ...]`. The workflow JSON saved a
    real Unicode glyph (U+1F4FB radio etc.) in the slot but the
    INPUT_TYPES choice list uses a plain `[EMOJI]` text placeholder
    (or vice versa).
  cause: |
    The web UI sometimes substitutes display-only emoji glyphs into
    saved widget values while the running node code keeps text
    placeholders for portability. ComfyUI's API validation does
    exact-string comparison, so the glyph form and the placeholder
    form do not match even though they look interchangeable.
  fix: |
    Add a tiny normalizer in the workflow→API mapper that strips
    leading emoji codepoints OR `[TAG]` prefixes before comparing
    against the schema's allowed list, then remaps to whichever
    form the running node actually expects. Land tests against
    both directions (glyph→placeholder, placeholder→glyph).
  verify: |
    Round-trip a workflow JSON containing each dropdown form
    through the API; both the UI and /prompt accept it.
  tags: [combo, encoding, emoji, api, exact-string-match]
  legacy_id: BUG-LOCAL-005

- id: "04.09"
  phase: 4
  area: workflow-json
  symptom: |
    After a "fix" that skipped ALL linked inputs from the
    widgets_values walk, a different node now misses values: a
    dropdown receives a number, a float receives an empty string.
    The fix overshot.
  cause: |
    ComfyUI's web UI distinguishes between two kinds of links: a
    plain link (input wired straight to an output, no widget UI)
    versus a "converted widget" (input that was originally a widget
    and was right-clicked into a socket, retaining the
    `"widget": {"name": ...}` metadata block). Plain links DO NOT
    consume widgets_values slots; converted widgets DO. Treating
    both identically corrupts mapping in the opposite direction.
  fix: |
    On every linked input, inspect the `widget` metadata. If
    present, the input still owns its widgets_values slot and must
    be counted in the positional walk; if absent, skip it
    entirely. The two classes need separate handling.
  verify: |
    Regression test where a node has a mix of plain-linked + widget-
    converted-linked + free widgets: every realized input matches
    what the UI shows.
  tags: [widget-drift, converted-widget, linked-inputs, workflow-to-api]
  legacy_id: BUG-LOCAL-006

- id: "04.10"
  phase: 4
  area: workflow-json
  symptom: |
    Same node randomly drifts on different machines: on one host the
    widget mapping is correct, on another the same workflow JSON
    submits with shifted values. Both machines run the same
    ComfyUI version.
  cause: |
    ComfyUI's `/object_info` endpoint can return the optional input
    list in a different order than the node's INPUT_TYPES dict
    iteration order, depending on Python dict ordering, custom node
    decorators, or upstream changes to the API. Workflow→API
    mappers that compute slot positions from `/object_info` while
    the workflow JSON saved widgets_values in INPUT_TYPES order
    (the UI's source) will silently mis-map every optional input
    after the first divergence.
  fix: |
    Pick ONE source of truth — INPUT_TYPES order — and read it
    from the node class directly (or import-based introspection)
    rather than from `/object_info`. Use `/object_info` only for
    type validation, never for slot positions. If the node's
    INPUT_TYPES is dynamic, expose a stable order via a
    `WIDGET_VALUE_ORDER` class attribute and consume that.
  verify: |
    Capture a debug dump of both the `/object_info` schema for the
    node and the realized widget keys in the API prompt; their
    intersection should match every widgets_values slot.
  tags: [widget-drift, object-info, input_types, schema-order]
  legacy_id: BUG-LOCAL-008

- id: "04.11"
  phase: 4
  area: combo
  symptom: |
    A guardrail / mode toggle (e.g. "Low VRAM profile") in a
    dropdown has zero observable effect. Logs do not record any
    enforcement, and the user gets full default behavior.
  cause: |
    The dropdown choice was renamed in INPUT_TYPES (e.g. for UI
    polish or to match a new tier name) but the runtime code that
    string-matches against the choice (`if profile == "Low VRAM
    Mode": ...`) was not grepped and updated. The string never
    matches, the if-branch is dead code, and the guardrail
    silently never fires. No exception, no warning.
  fix: |
    Treat the set of dropdown choices as a typed enum. Define them
    once as module-level string constants and import the constants
    at every call site. When renaming a choice, replace the
    constant in one place and let the type checker / grep find all
    usages.
  verify: |
    Integration test that selects each profile from the dropdown
    and asserts the corresponding guardrail log line appears (or
    that the corresponding code path actually fires).
  tags: [combo, dropdown, dead-code, string-mismatch, guardrail]
  legacy_id: BUG-LOCAL-011

- id: "04.12"
  phase: 4
  area: workflow-json
  symptom: |
    Workflow→API mapper emits a custom-typed input as the wrong
    KIND of value (e.g. project_state arrives as a string when it
    should be a custom dict). The dropdown that comes after it gets
    that custom type's intended value, and so on cascading.
  cause: |
    ComfyUI's INPUT_TYPES can declare custom types (e.g.
    `("PROJECT_STATE",)`) that are SOCKET-ONLY — they have no
    widget representation in the UI and never appear in
    widgets_values. A positional walker that iterates every input
    in INPUT_TYPES order and consumes a slot per iteration will
    consume slot N+1 for the input that should have come from a
    socket, shifting all downstream inputs by one.
  fix: |
    Add an `_is_widget_backed(spec)` helper that returns True only
    for primitives (STRING/INT/FLOAT/BOOLEAN) and dropdowns
    (list-typed specs); False for all custom socket-only types.
    Walk INPUT_TYPES in declaration order but consume a
    widgets_values slot only when `_is_widget_backed` is True.
    Custom-typed inputs come from the link map or are omitted.
    Defense in depth: declare socket-only inputs LAST in the
    optional block so any future regression cannot shift widget
    slots.
  verify: |
    Regression test asserts (a) socket-only typed values never
    appear in `inputs`, (b) the dropdown that follows them keeps
    the correct value, and (c) instrumented `API_PAYLOAD` and
    `DRIFT_DETECTED` log lines fire on the live request.
  tags: [widget-drift, socket-only, custom-type, positional, input_types]
  legacy_id: BUG-LOCAL-027

- id: "04.13"
  phase: 4
  area: workflow-json
  symptom: |
    Two nodes in the same workflow JSON both have linked converted
    widgets but their widgets_values arrays are shaped
    differently — one has 4 slots for 6 widget-backed params, the
    other has 5 slots for 5 widget-backed params. A single mapper
    that picks one shape and forces it gets one node right and
    breaks the other.
  cause: |
    ComfyUI's web UI saves widgets_values in two inconsistent
    shapes depending on when and how a widget was converted to a
    socket: "stripped" (linked converted widgets consume zero
    slots) and "preserved" (linked converted widgets keep an empty
    placeholder slot). Both shapes are valid in the wild; neither
    is universal. The shape difference is invisible to inspection.
  fix: |
    Auto-sense the mode per node from slot-count arithmetic: if
    `len(widgets_values) == widget_backed_count` AND there is at
    least one linked widget-backed input, treat it as preserved
    mode (linked params each consume an empty placeholder). If
    `len(widgets_values) == unlinked_count`, treat it as stripped
    mode. Ambiguous cases (truncated trailing optionals, manual
    JSON edits) default to stripped mode, which errs toward
    omission rather than mis-mapping.
  verify: |
    Regression suite covers BOTH shapes in a single workflow JSON.
    Mapper produces correct realized inputs on each node without
    a global config knob.
  tags: [widget-drift, preserved-stripped, auto-sense, converted-widget, workflow-json]
  legacy_id: BUG-LOCAL-029

- id: "11.12"
  phase: 11
  area: llm
  symptom: |
    A "high creativity" or "maximum chaos" preset (high temperature,
    high top_p) silently produces dialogue in non-canonical formats:
    `*NAME*(emotion): line` with single asterisks where the parser
    expects 0 or 2; or no markup at all. The parser's permissive
    fallback returns nonzero matches by latching onto structural
    tags (ENV/SFX/MUSIC), so dialogue_count > 0 and the safety gate
    does not fire — the episode ships with garbage characters and
    near-silent audio.
  cause: |
    Three compounding gaps: (1) no temperature ceiling, so the LLM
    drifts off-format; (2) parser regex is too narrow to recognize
    the off-format output; (3) permissive fallback has no structural-
    name blocklist, so it accepts SFX/ENV tags as cast members and
    masks the failure. Any one of the three would have produced a
    loud failure; together they hide it.
  fix: |
    Defense in depth: (a) clamp creativity preset temperatures so
    the LLM stays within format range (e.g. cap at ~0.95 for
    Mistral-Nemo-class models); (b) harden the primary regex to
    accept 0..N asterisks / mixed markdown around the name; (c)
    add a Format Normalizer pass — same LLM, very low temperature,
    rewrites whatever the writer produced into strict canonical
    form BEFORE parsing; (d) maintain a structural-name blocklist
    (SCENE/ACT/ENV/SFX/MUSIC/NARRATOR/TITLE/VOICEOVER/etc.) that
    every parser fallback consults so structural tags can never
    masquerade as characters.
  verify: |
    Run a "maximum creativity" preset 5 times. Runtime log shows
    `CREATIVITY ... temp=<= 0.95` and `FORMAT_NORM: Success` (or
    documented failure) on every run, dialogue_count > 0 with
    real character names, and the structural-name blocklist
    rejects any tag the writer accidentally promoted to a
    character.
  tags: [llm, creativity, format-drift, normalizer-pass, structural-blocklist, parser-resilience]
  legacy_id: BUG-LOCAL-014

- id: "11.13"
  phase: 11
  area: llm
  symptom: |
    A normalization / rewrite LLM pass exceeds its wall-clock
    budget (e.g. 120s timeout). The token stream shows the dialogue
    count plateau early then keep generating prose, scene
    descriptions, or stage-direction filler for hundreds more
    tokens. Pipeline silently falls back to the un-normalized text.
  cause: |
    Token budget was sized off input length with too-generous
    headroom (e.g. `min(2048, len/3 + 500)`), and there was no
    early-stop heuristic. After the dialogue content is exhausted
    the model drifts into narrative prose to fill the budget. The
    timeout is a blunt wall-clock kill, not a quality gate.
  fix: |
    Tighten BOTH dimensions: (a) lower max_new_tokens to a tighter
    multiple of input length (e.g. `min(1024, len/4)`) so there is
    no "generate filler to reach budget" runway; (b) lower the
    wall-clock timeout to match the new token budget at observed
    throughput; (c) for long inputs, chunk by structural marker
    (scene / section) and apply per-chunk budget+timeout instead
    of one-shot. Log token-generated, budget, and elapsed per pass
    so future regressions are visible.
  verify: |
    Run a long input (e.g. 50+ dialogue lines) through the pass.
    Log shows wall-time < timeout and tokens-generated within
    budget; no fallback-to-original message.
  tags: [llm, token-budget, wall-time, runaway-tokens, early-stop, normalizer]
  legacy_id: BUG-LOCAL-019

- id: "11.14"
  phase: 11
  area: llm
  symptom: |
    Episodes systematically undershoot a user-facing duration
    target (e.g. user picks 8-minute target, output is 3.7
    minutes). The LLM prompt cites the same minute target but
    output is much shorter. Estimator was right by line count,
    wrong by duration.
  cause: |
    User-facing units (minutes) are not measurable by the LLM —
    the LLM has no reliable internal mapping from words to
    spoken duration. Prompts that demand "an N-minute episode"
    rely on the model's vibe of length, which varies wildly by
    model and temperature. The downstream estimator typically
    uses a generic words-per-minute constant (e.g. 130 wpm for
    "speech") that does not match the actual TTS engine's pace
    (e.g. Bark plays at ~67 wpm).
  fix: |
    Two-part: (a) measure your TTS engine's actual wpm against a
    fixed-length reference and bake that constant into the
    estimator (`TTS_WPM = 67`); (b) translate user-facing minutes
    to LLM-facing word count (`target_words = target_minutes *
    TTS_WPM`) in the prompt — "write at least N words of
    dialogue" is countable; "write an N-minute episode" is not.
    Add a post-generation enforcement step that re-runs the LLM
    if word count is < 70% of target.
  verify: |
    Across N=10 runs at the same target, observed runtime falls
    within 10-20% of target. The estimator log line names the
    measured wpm constant. Post-generation enforcement triggers
    only on undershoot.
  tags: [llm, duration, words-per-minute, target-words, post-enforcement, units]
  legacy_id: BUG-LOCAL-020

- id: "11.15"
  phase: 11
  area: llm
  symptom: |
    A single-pass LLM polish step (grammarian, format normalizer,
    rewriter) times out on long inputs and silently falls back to
    the unpolished text. Short inputs work fine.
  cause: |
    Token budget × backend throughput exceeds the wall-clock
    timeout for long inputs. Single-pass design has no graceful
    way to stay under budget — the operation either fits or
    fails.
  fix: |
    Chunk the input by a structural marker (scene, section,
    paragraph). Apply the polish pass per chunk with its own
    token budget + timeout (e.g. 1024 tokens / 75-90s each).
    Reassemble the chunks. Reserve single-pass for inputs below
    a heuristic threshold (e.g. <= 50 dialogue lines or < 2
    chunks). Each chunk has its own quality safety check; failed
    chunks keep their original text without blocking the rest.
  verify: |
    Run a long input (50+ structural units). Log shows `Chunked
    mode` followed by per-chunk progress and `Chunked complete`.
    Total wall time scales linearly with chunk count, not
    quadratically.
  tags: [llm, chunked-generation, polish, normalizer, timeout, scaling, xref-11.13]
  legacy_id: BUG-LOCAL-023

- id: "11.16"
  phase: 11
  area: llm
  symptom: |
    Format normalizer pass is skipped on a malformed script. The
    skip-heuristic says "looks fine, save the LLM call." Downstream
    parser then fails because the script was actually malformed.
  cause: |
    Skip heuristics that check ONE signal (dialogue line count,
    scene count, cast count) and skip when ANY signal looks
    healthy will let through scripts where one structural piece
    is sound and others are missing. A "ghost run" with bracket
    dialogue but no CAST or scene markers passes a dialogue-only
    check.
  fix: |
    Require ALL THREE signals present before skipping: dialogue
    lines AND scene markers AND distinct cast count. Missing any
    one forces normalization to run. Log the skip decision with
    each individual count so future regressions are visible.
  verify: |
    Feed a ghost run (dialogue only, no CAST, no scenes) through
    the heuristic. It must NOT skip; the runtime log must record
    `missing: scenes cast` (or whichever signals are absent).
  tags: [llm, normalizer, skip-heuristic, ghost-run, defense-in-depth, xref-11.09]
  legacy_id: BUG-LOCAL-024

- id: "12.37"
  phase: 12
  area: regression
  symptom: |
    A regex like `===\s*SCENE\s+(\S+?)\s*===` matches the literal
    sentinel word `FINAL` (e.g. `=== SCENE FINAL ===`) as a scene
    number. Downstream counters double-count scenes and parsers
    treat sentinel-section content as content.
  cause: |
    `\S+?` matches any non-whitespace token. When the domain values
    are integers (scene numbers) but the sentinel token is also
    non-whitespace, the regex cannot tell them apart. Greedy /
    lazy makes no difference here.
  fix: |
    Type the capture group to the actual domain. For numeric
    scene numbers use `\d+`. Add a separate explicit pattern for
    the sentinel (`=== SCENE FINAL ===`) that emits a typed
    terminator token (e.g. the string `END`) instead of a number.
    Downstream consumers can then tell the kinds apart cleanly.
  verify: |
    Regression test with a script containing `=== SCENE 1 ===`,
    `=== SCENE 2 ===`, `=== SCENE FINAL ===`. Counter returns 2
    scenes plus a terminator, not 3 scenes.
  tags: [regex, sentinel, type-the-capture, parser, scene-marker]
  legacy_id: BUG-LOCAL-026

- id: "11.17"
  phase: 11
  area: llm
  symptom: |
    Critique-and-revise (or any per-pass diagnostic) crashes with
    `ZeroDivisionError` because it computes `(revised_len /
    draft_len) * 100`. Crash propagates and aborts the whole
    pipeline even though the revised pass produced a complete
    script.
  cause: |
    Diagnostic code computed a ratio without guarding for zero
    denominator. The initial draft pass legitimately returned 0
    chars (LLM produced nothing recoverable); ratio math blew up.
  fix: |
    Always guard ratios with a zero-denominator check. Either
    return a sentinel (`-1.0`, `None`, `nan`) or log a warning and
    fall through to the next stage. Diagnostic code must never
    propagate exceptions to the main pipeline.
  verify: |
    Inject an empty draft text into the diagnostic. Pipeline
    completes; log shows the warning; no traceback.
  tags: [llm, diagnostic, zero-division, guard, robustness]
  legacy_id: BUG-LOCAL-085

- id: "11.18"
  phase: 11
  area: llm
  symptom: |
    LLM-output parser (Director plan, structured JSON, schema
    validator) raises `ValueError` on a malformed output. The
    exception propagates and aborts the entire pipeline run, losing
    upstream LLM/Bark/audio work that already succeeded.
  cause: |
    "Abort to prevent silent failure" was the original policy, but
    it was applied at every parse failure, even ones where
    downstream just needs a structured plan and could accept a
    minimal default. There was no fallback path and no debug-dump
    of the raw LLM output.
  fix: |
    Three-piece pattern: (1) typed exception class
    (`<Subject>JSONParseError(ValueError)` carrying the raw
    output); (2) ALWAYS dump the raw LLM output to a timestamped
    debug file under your output dir BEFORE raising — cheap
    insurance for post-mortem; (3) build a minimum-viable fallback
    plan from upstream signals already in scope (script VOICE
    tags → minimal voice_assignments, default values for
    everything else). Log loudly that the fallback fired so the
    operator sees reduced quality but the run completes.
  verify: |
    Force a parse failure (mock the LLM output). Pipeline reaches
    audio/video phases at default quality; raw output is preserved
    on disk; log records `<Subject>: BUG-090 fallback active`
    instead of a traceback.
  tags: [llm, parser-resilience, fallback, raw-output-dump, dont-abort-after-expensive-work]
  legacy_id: BUG-LOCAL-090

- id: "11.19"
  phase: 11
  area: llm
  symptom: |
    Script parser registers structural tags as cast members
    (`ALARM BLARING`, `BACK AT THE LAB`, `EQUIPMENT ALARMS`,
    etc.). Downstream Director writes voice_assignments for them,
    TTS renders silence or noise for them, real characters get
    fewer lines than they should.
  cause: |
    Cast-detection blocklist checked only the FIRST WORD against
    a small structural-token enumeration (ENV / SFX / SCENE /
    ACT / MUSIC ...). Multi-word stage-direction phrases whose
    first word is innocuous (`ALARM`, `BACK`, `CHAMBER`) bypass
    the check. Enumeration approach is wrong by construction —
    the set of permissible first-word tokens is unbounded.
  fix: |
    Replace first-word enumeration with a content-based regex
    blocklist that scans the WHOLE name for patterns:
    `\bBLARING\b`, `\bWHOOSH\b`, `\bAT THE\b`, prefixes like
    `^SFX\b`, `^MUSIC\b`. Apply identically to every parser
    acceptance path (inline, standalone, bare-NAME). When a
    rejection happens, route the line to its next-most-plausible
    category (e.g. SFX entry) rather than dropping silently —
    the LLM's intent was to mark a cue, just not as a character.
    Treat the blocklist as a regression-test asset that grows
    over the project's life.
  verify: |
    Feed the parser a script with both `[ALARM BLARING]` and
    `[GENERAL THOMPSON, male, 50s]`. Cast set contains exactly
    `{GENERAL THOMPSON}`; ALARM BLARING is in the SFX list.
  tags: [parser, cast-detection, content-blocklist, multi-word, sfx-route, multi-path-symmetry]
  legacy_id: BUG-LOCAL-091

- id: "07.11"
  phase: 7
  area: video
  symptom: |
    Multi-layer video composite has the wrong layer in the
    pillarbox / letterbox. Pillarbox shows solid magenta where it
    should show an audio-reactive visualizer. Foreground subjects
    look pink/washed out.
  cause: |
    Filter graph put the procgen / texture layer on TOP at
    `addition` blend ~50% over a black canvas + foreground.
    Additive blend pushed pillarbox pixels from black toward the
    procgen color and tinted the foreground. The intent was
    "audio-reactive sheen" but the default opacity made the
    layer the dominant visual.
  fix: |
    In any multi-layer composite, the layer that fills negative
    space (pillarbox / letterbox / transparent regions) MUST be
    the BASE layer at full opacity, not a blanket overlay.
    Foreground content layers go on top of the base, masked to
    their own region. Default optional sheen passes to opacity 0
    and `lighten`/`screen` (preserves underlying tones) rather
    than `addition`/0.5 (saturates / tints). Test visually with
    real procgen content, not just unit-tested for ffmpeg syntax.
  verify: |
    Render a smoke composite with the new defaults. Pillarbox
    shows the visualizer; foreground subjects look natural.
    Dialing sheen opacity > 0 only flashes through on bright
    peaks, never tints the whole frame.
  tags: [composite, ffmpeg, blend-mode, pillarbox, layer-ordering, procgen]
  legacy_id: BUG-LOCAL-092

- id: "12.38"
  phase: 12
  area: regression
  symptom: |
    A dedup or merge step removes a row from a primary table, but
    referencing tables (lines, sfx, etc.) still point at the
    dropped row's id. Lookups silently fail or fall back to
    defaults; data integrity is broken without any error.
  cause: |
    The dedup function returned the deduplicated list but had no
    mechanism to surface a `loser_id → winner_id` alias map. The
    caller dropped the loser rows but never rewrote referencing
    table cells. Foreign-key safety was implicit and unenforced.
  fix: |
    Whenever dedup/merge REMOVES a row from a primary table:
    (1) the dedup function MUST return both the deduplicated list
    AND an alias map from loser-id to winner-id; (2) the caller
    MUST iterate every referencing table and rewrite cells whose
    id is in the alias map; (3) flatten chained aliases (A→B→C
    becomes A→C) so any reference resolves in one lookup; (4) log
    the alias map at INFO level so post-mortem can verify the
    rewrite touched every reference.
  verify: |
    Regression test: feed dedup a 3-row table with two near-
    duplicates and a referencing table that points at all three.
    After dedup + alias-rewrite, every reference resolves to a
    surviving row.
  tags: [dedup, foreign-key, alias-map, atomic-rewrite, data-integrity]
  legacy_id: BUG-LOCAL-098

- id: "11.20"
  phase: 11
  area: llm
  symptom: |
    LLM-output parser fails on malformed JSON. Pipeline either
    aborts (lost upstream work) or falls back to a minimum plan
    that throws away rich content the LLM had actually generated.
  cause: |
    Two-tier resilience (parse → minimal fallback) is the wrong
    shape for the common failure mode. Parse failures are usually
    structural malformation (unclosed brace, embedded markdown,
    JS-style comment leakage), not a model that doesn't
    understand the task. The content sits in the raw output —
    asking the LLM to re-emit it as valid JSON usually recovers
    everything.
  fix: |
    Three-tier resilience chain: (1) parse the LLM's first
    output directly — happiest path; (2) if parse fails, build a
    strict-JSON repair prompt that includes the failed raw output
    and the expected schema, call the LLM with very low
    temperature (0.05–0.15) and a smaller "cleanup" model when
    available, parse the repair output through the same
    extractor; (3) only if BOTH parses fail, fall back to a
    minimum-viable plan. Save raw output to a debug file every
    time a tier escalates.
  verify: |
    Force a parse failure. Log shows `BUG-099 JSON-repair retry`
    followed by `LLM-repair pass recovered content`. The plan has
    non-empty content fields preserved from the original LLM
    output, not a stripped-down default.
  tags: [llm, json-parse, three-tier-resilience, repair-pass, cleanup-model, content-recovery]
  legacy_id: BUG-LOCAL-099

- id: "11.21"
  phase: 11
  area: llm
  symptom: |
    Script parser captures a third-person stage direction as the
    dialogue body (e.g. "Lev bursts onto the deck...") and routes
    it to TTS. The actual dialogue line below the tag is silently
    dropped because no parser variant matched it. The audio
    contains narrative prose spoken in a character's voice.
  cause: |
    LLMs sometimes emit production-script-style formatting where
    a `[VOICE: NAME, traits]` tag is followed by a third-person
    action line and the actual dialogue is on the line BELOW.
    The parser's inline pattern greedily captures everything
    after the tag bracket as dialogue, treating the action line
    as the spoken line and never reaching the real dialogue.
  fix: |
    Add a heuristic mismatch-detector that runs after a parser
    variant matches: `_is_inline_narration(speaker, captured_text)`
    returns True when the captured text starts with the speaker's
    own first name in third person (real dialogue almost never
    starts with the speaker's name in third person about
    themselves). On True, look ahead to the next non-empty,
    non-tag line and treat THAT as the dialogue, consuming both
    source lines. On lookahead failure, log a warning and fall
    through to the variant's original behavior. Log info-level
    decisions so production runs are auditable.
  verify: |
    Feed the parser a `[VOICE: LEV] Lev bursts onto the deck.\n
    Got the spec yet?` two-line input. Output shows one dialogue
    line: speaker=LEV, text="Got the spec yet?". A `BUG-100:
    rejected inline narration` log line appears.
  tags: [parser, narration-leak, look-ahead, heuristic-mismatch, multi-format-llm]
  legacy_id: BUG-LOCAL-100

- id: "07.12"
  phase: 7
  area: audio
  symptom: |
    TTS clip starts with a non-verbal sound (breath, throat clear,
    chuckle) that bleeds 200-500 ms before the first dialogue
    word. Listeners perceive nonsense words leading every line.
  cause: |
    `_clean_text_for_bark` (or equivalent) translated parenthetical
    stage directions like `(panting)` to model-supported non-verbal
    tokens like `[pants]`. Bark renders the token at the START of
    the clip, where it leaks audio milliseconds into the next clip
    boundary. Whisper / human ear can over-interpret the rendered
    breath as articulated phonemes.
  fix: |
    Drop ALL parenthetical content via
    `re.sub(r'\([^)]{1,80}\)\s*', '', text)` BEFORE handing to
    TTS. Stage-direction parentheticals are screenplay shorthand
    for human actors, not for TTS engines. Bracketed tokens like
    `[laughs]` written explicitly by the dialogue author still
    pass through — only the auto-translated paren-form is
    dropped. If vocal flourish is desired, the dialogue author
    writes it inline ("Hahaha! That's rich.") so TTS tokenizes it
    as part of the utterance.
  verify: |
    `_clean_text_for_bark('(panting) we have lost time')` returns
    `'we have lost time'`. Bracketed `[laughs]` survives the
    whitelist. Two implementations of the helper in different
    modules pass an identical-output contract test.
  tags: [tts, bark, clip-boundary, nonverbal-token, paren-stripping]
  legacy_id: BUG-LOCAL-101

- id: "07.13"
  phase: 7
  area: audio
  symptom: |
    Audio-to-video model (HuMo, similar) renders clips where the
    audio consistently leads the lips by 100-200 ms. Constant
    offset every clip, every episode. Architecturally the model
    is audio-to-video so lips cannot lead audio; the lag is
    intrinsic.
  cause: |
    Audio-to-video models with image-anchored first frames
    (Wan + Whisper-conditioned audio cross-attention, etc.) hold
    the reference portrait static for ~3-6 output frames before
    motion onset. The first articulated lip motion lands at
    frame 3-6 (~120-240 ms at 25 fps). When per-line audio is
    fed in starting at sample 0 and per-line video starts at
    frame 0, the first audible phoneme aligns with the static
    freeze.
  fix: |
    Pre-pad each per-line audio with leading digital silence so
    the model burns its motion-onset freeze on the silence
    rather than the first phoneme. After VAE decode but before
    save, drop the leading pad_frames from the image tensor and
    the matching leading silence from the audio. The on-disk
    clip is the original duration and starts at the first
    articulated motion + first dialogue word — downstream
    timeline math is unchanged. Make the pad amount a tunable
    widget (default ~200 ms, min 0 = disabled). Stamp the pad
    value into the per-clip ledger entry for traceability.
  verify: |
    `pad(48000-sample tensor, 9600)` returns 57600 samples;
    `trim(57600, 9600)` returns 48000 samples (back to
    original). Saved clip is the requested duration. Listener
    perception of lag drops from "audio always leads" to
    "alignment within ~30 ms".
  tags: [audio-to-video, motion-onset, silence-pad, clip-boundary, humo, lip-sync]
  legacy_id: BUG-LOCAL-102

- id: "05.08"
  phase: 5
  area: execution-order
  symptom: |
    A render artifact required by an independent role (ANNOUNCER
    bookend image) is not produced because a different feature
    flag (open_close) is OFF. The role exists without that flag,
    so downstream gets a missing artifact and renders the wrong
    fallback (e.g. character portrait instead of broadcast still).
  cause: |
    The render gate was bound to a feature flag that doesn't
    fully cover when the artifact is needed. Flag and role policy
    were entangled; the flag controls more than its name suggests.
  fix: |
    Decouple gates from role policy. The render gate should fire
    based on the actual presence of the role in the work plan
    (`if any(line.role == "ANNOUNCER")`) not based on a flag
    that was originally meant for a related-but-different feature
    (`if open_close`). Audit every feature flag's gate condition
    to confirm it matches the actual dependency, not a sibling
    feature's name.
  verify: |
    Run with the feature flag OFF but the role present. Render
    artifact is produced. Flag-coverage test: for every flag,
    enumerate dependent artifacts and assert the gate condition
    matches the artifact's actual need.
  tags: [feature-flag, gate, role-policy, decoupling, artifact-render]
  legacy_id: BUG-LOCAL-127

- id: "07.14"
  phase: 7
  area: audio
  symptom: |
    `ffmpeg -shortest` concat mux truncates the tail of the master
    audio when sum(per-clip durations) is less than the intended
    total episode duration. ~70s of dialogue audio just disappears
    even though the per-clip files are intact.
  cause: |
    `concat -shortest` resolves the output length to the SHORTEST
    input. If the per-clip stream is shorter than the master mix
    (because static / silence-fill segments were dropped or some
    clips weren't rendered for non-speaking roles), the output
    truncates to the per-clip total. The per-clip stream's length
    is now the contract; the master mix loses content.
  fix: |
    Either tail-pad the per-clip stream with role-appropriate
    fills (radio still + ambient for ANNOUNCER, character still
    for non-speaking dialogue beats) so its length matches the
    master mix, OR replace `-shortest` with explicit `-t
    <total_episode_dur_s>` and let the longer stream be silenced
    naturally. Always log `mux outcome: per_clip_dur=X master_
    dur=Y delta=Z` so silent truncations are visible.
  verify: |
    Run a workflow where per-clip total is less than master mix
    total. Output mp4 duration matches the intended total
    episode duration; tail audio is preserved.
  tags: [ffmpeg, concat, shortest, audio-video-sync, tail-padding, mux]
  legacy_id: BUG-LOCAL-128

- id: "07.15"
  phase: 7
  area: model-class
  symptom: |
    A node correctly stamps `ref_image` for an ANNOUNCER role
    with a non-face image (radio still). The upstream model node
    receives the stamp but renders character-face video anyway.
    Logs say everything is wired correctly; visually the model
    ignores the input.
  cause: |
    `ref_image` in the upstream node looks like a strict
    first-frame I2V conditioner from outside, but inside the
    model body it is encoded into a soft `reference_latents`
    field appended to the positive conditioning. The actual
    generation starts from a zero latent and is denoised by
    KSampler. The reference is a soft attention HINT that the
    model (fine-tuned on human faces with audio-driven
    lip-sync) uses for face-identity continuity — it is NOT a
    strict first-frame lock and NOT a generic image-to-video
    starter. A non-face reference has nothing to lock onto;
    the model falls back to text-prompt-driven face generation.
  fix: |
    Class lesson: don't conflate conditioning-code shape with
    model capability. When a parameter exists in the upstream
    node API, READ THE NODE SOURCE to confirm what the parameter
    actually does. Specific case: when an audio-to-video model is
    face-locked, route non-face roles through a different code
    path (e.g. ANNOUNCER → static-image + audio mux, no audio-
    to-video model). Add a per-role dispatch table that selects
    the correct render backend by role+reference-shape, not by
    whether the upstream node "supports" `ref_image`.
  verify: |
    For each non-face role, the rendered clip first frame is the
    expected non-face image (read via ffmpeg -vframes 1). For
    face roles, the rendered clip uses the face reference. Log
    shows the per-role dispatch decision.
  tags: [model-class, conditioning, ref-image, capability-vs-shape, dispatch]
  legacy_id: BUG-LOCAL-129

- id: "05.09"
  phase: 5
  area: execution-order
  symptom: |
    A two-step ledger update silently skips both steps when one
    of two preconditions is unmet. Some rows have valid placement
    metadata, but mirrored rows are missing entirely from a
    downstream consumer's view.
  cause: |
    Compound conditional gate `if A and B:` collapses two
    independent steps under one branch. When A is empty/falsy,
    BOTH steps are skipped — including the step that would
    process whatever already-valid data B contains.
  fix: |
    Split the gate into two: `if A and B: <step that needs both>`
    AND `if A: <step that only needs A>`. When the steps' data
    requirements differ, their gates must differ. Add an
    unconditional log line at the end of the loop (`mirror
    outcome: in=N appended=M filtered=K`) so silent zero-mirror
    runs are visible.
  verify: |
    Run with B empty. Step 1 skips (correctly), step 2 still
    processes A's rows. Outcome log line records the actual
    counts.
  tags: [conditional-gate, independent-steps, ledger-update, silent-skip]
  legacy_id: BUG-LOCAL-130

- id: "11.22"
  phase: 11
  area: llm
  symptom: |
    Bookend / template enforcer regex doesn't match the modern
    prompt format. A required template section is detected as
    missing on every run. Secondary fallback fires repeatedly
    even when the original output is correct.
  cause: |
    Regex format drift. The detection regex was written when the
    prompt asked for one format (e.g. bare `ANNOUNCER:`); the
    prompt was updated to a different format (e.g. bracketed
    `[VOICE: ANNOUNCER]`) but the regex was not updated. The
    primary detector never matches the new shape. Compounding:
    the secondary fallback has no ultimate fallback — when it
    also fails, output ships in the bad shape.
  fix: |
    Treat prompt format and detection regex as a paired contract.
    When you change one, update the other in the same atomic
    commit. Detection regex should accept BOTH old and new
    formats during transitions:
    `^(?:ANNOUNCER\s*:|\[VOICE\s*:\s*ANNOUNCER\b)` with
    `IGNORECASE`. Widen the head/tail sniff window from 500 to
    2000 chars to survive long preambles. Add a deterministic
    ultimate fallback (placeholder text keyed off episode_title)
    so the section is ALWAYS present even when both LLM passes
    fail.
  verify: |
    Verify-script with 11 cases: bare-colon, bracketed-VOICE,
    mixed-case, multiline, after-preamble, plus negative cases
    (regular text, other-character VOICE tags, the word
    "announcer" mid-sentence). All match correctly. Live run
    shows ANNOUNCER role on first AND last line.
  tags: [llm, regex-format-drift, prompt-detector-contract, ultimate-fallback]
  legacy_id: BUG-LOCAL-131

- id: "11.23"
  phase: 11
  area: llm
  symptom: |
    Length prompts ask for "AT LEAST N words" of a small target
    (e.g. 30 words for a smoke run). The LLM produces 200+ words.
    Floor satisfied; ceiling absent; downstream rendering takes
    hours instead of minutes.
  cause: |
    "AT LEAST N words" is a floor with no upper bound. The LLM
    treats it as permission to write whatever feels narratively
    complete. For small targets, "narratively complete" is
    typically 10-100x larger than N — the LLM rationally
    overshoots into the hundreds.
  fix: |
    For short targets (<= some threshold like 50 words), branch
    the length instruction to use BOTH floor AND ceiling:
    "EXACTLY N words (range: N to ceiling, HARD CAP) ... STOP
    writing as soon as you have a beginning, middle, and end
    that fit in <ceiling> words. Long monologues are FORBIDDEN."
    Ceiling = `max(N + 10, N * 1.4)`. For long-form targets
    (>=51 words), keep the original "AT LEAST" phrasing because
    long dialogue should be free to grow into the full target.
  verify: |
    Run 5 ultra-smoke trials at 30-word target. Each output's
    word count is between 25 and 45.
  tags: [llm, length-prompt, floor-ceiling, smoke-preset, overshoot]
  legacy_id: BUG-LOCAL-132

- id: "12.39"
  phase: 12
  area: llm-routing
  symptom: |
    Round-robin LLM consult script returns valid markdown every
    run, but spot-checking the saved transcripts shows the calls
    are landing on stale fallback models (gpt-4.1, gemini-2.5-pro,
    mistral-nemotron) instead of the intended frontier rungs.
    The script's stderr just says "model unavailable, trying
    next..." with no information about WHY.
  cause: |
    Three convergent failure classes when AI coding agents call
    out to multiple LLM providers via hardcoded model lists:
    (1) MODEL NAME DRIFT — providers rename, deprecate, and
    replace models on a months-not-years cadence; hardcoded
    ladders go stale silently.
    (2) ENDPOINT DRIFT — newer models (e.g. OpenAI gpt-5.x)
    are scoped to specific endpoints (Responses) and 4xx on
    others (Chat). Without endpoint-aware dispatch the script
    falls through silently.
    (3) ALIASING PITFALLS — `*-latest` aliases resolve to
    whatever the provider currently considers "latest," which
    can change without notice and silently land on a different
    tier.
    Compounded by generic untyped error logging that hides
    model_not_found vs endpoint_mismatch vs permission vs
    rate-limit.
  fix: |
    Apply five formalizations:
    (1) PROBE-FIRST. At startup hit `GET /v1/models` for each
        provider, intersect with the configured ladder, prune
        dead rungs, log the live set.
    (2) LADDER-STALENESS ALARM. Track `last_reviewed:` date in
        config. Warn at startup if older than ~60 days.
    (3) ENDPOINT-AWARE DISPATCH. Tag each model entry with
        `endpoint=responses|chat|both|generate_content` and
        route correctly per rung.
    (4) CAPABILITY TAGS + ROUTING. Tag each model with
        `(text|vision|tools|reasoning)`. Callers express needs
        (`needs="reasoning+tools"`), runner filters by
        capability rather than relying on operator-maintained
        order.
    (5) TYPED ERROR LOGGING. On every fall-through, log the
        typed reason (model_not_found vs endpoint_mismatch vs
        permission vs rate_limit vs transport). Fall through
        on the first four; re-raise on transport / 401 /
        unknown.
    Reference implementation lives in `llm_round_robin/` in
    this repo — drop it next to your custom-node pack and let
    your AI agent invoke it via `python -m llm_round_robin
    --question file.md --topic xyz [--needs reasoning+tools]`.
  verify: |
    Round-robin run logs HTTP codes per attempt; saved
    transcript shows the consult landed on a top-of-ladder
    rung (or the typed reason for each fall-through is
    visible). The probe pruned stale rungs before any consult
    fired. Ladder-staleness alarm warns when last_reviewed is
    >60 days old.
  tags: [llm-routing, stale-api-ladder, probe-first, endpoint-aware, capability-routing, typed-error-logging, model-deprecation]
  legacy_id: BUG-LOCAL-133

- id: "11.24"
  phase: 11
  area: llm
  symptom: |
    A single point-of-truth normalizer claims "all downstream
    consumers see clean text," but downstream counters report
    zero dialogue on a perfectly good script. Pipeline triggers
    expensive rescue passes that throw their own valid output
    away.
  cause: |
    The normalizer's regex set didn't recognize a new LLM-emitted
    format that the parser at the END of the pipeline DID accept.
    Counters BETWEEN the normalizer and the final parse stage
    were blind to the format. A parser fix at the final stage
    didn't propagate backward into intermediate counters or
    rescue paths — they were written once and never revisited
    when format support widened.
  fix: |
    (a) When you add a new accepted format to a parser, audit
    every regex BETWEEN the model output and the final parse for
    the same blind spot — if a counter has its own regex, update
    it in the same commit.
    (b) Rescue pipelines (extension passes, fallbacks) have their
    own regexes; audit those too.
    (c) When a normalizer's docstring promises "single point of
    truth," its test battery must exercise EVERY observed LLM
    output format against it as a regression-test asset.
  verify: |
    Direct smoke-test the normalizer's text against the new
    format; count of dialogue lines after normalization matches
    the parser's count. Rescue path is not triggered when the
    primary path produces valid output.
  tags: [llm, normalizer, format-drift, single-point-of-truth, audit-the-audit, parser-coordination]
  legacy_id: BUG-LOCAL-063

- id: "11.25"
  phase: 11
  area: llm
  symptom: |
    The LLM systematically produces narration-only "scripts"
    where most dialogue is stage direction and characters never
    talk. Word count is high; meaningful character dialogue
    count is zero.
  cause: |
    Prompt audit reveals three gaps: (1) the min-line floor is
    asserted in only 1 of N prompts (system prompt), so user
    prompts and follow-up passes don't re-assert it — LLMs
    under-weight system-prompt rules vs user-prompt rules on
    short calls; (2) ZERO prompts explicitly forbid narration-
    only output; the failure mode is unnamed in the prompt set;
    (3) prompts insist on ONE specific format (e.g. `[VOICE:
    NAME, ...]`) when the underlying model often emits a
    parseable shorthand variant naturally — the prompt is
    fighting the model on a format the parser already accepts.
  fix: |
    Re-assert the dialogue-count floor at the top of EVERY
    LLM call site (system + user + spine + evaluator + critique
    + revise). Add an explicit `=== HARD REQUIREMENTS ===`
    block listing: REQ-1 character dialogue is mandatory
    (narration-only scripts are rejected), REQ-2 the parser
    accepts both `[VOICE: NAME, ...]` and `[NAME, ...]`
    interchangeably (pick one), REQ-3 the NAME slot must be a
    character name, not a gender/descriptor word. Add
    DIALOGUE DENSITY as an explicit selection criterion to
    any spine-evaluator step.
  verify: |
    Across N runs, no `0 dialogue lines` DONE telemetry. Final
    output has dialogue word count near target. Spine
    evaluator never picks narration-heavy winners.
  tags: [llm, prompt-audit, dialogue-floor, narration-collapse, multi-format-tolerance]
  legacy_id: BUG-LOCAL-062

- id: "12.40"
  phase: 12
  area: caching
  symptom: |
    Long pipeline reports "LLM cache mismatch (Context Cap: 6144)"
    every phase boundary even though every input (model_id,
    profile, context_cap, etc.) is identical. Each mismatch
    triggers a full unload + cold reload (~15-17s). Wall-clock
    thrashes 60-90s per run with zero quality benefit.
  cause: |
    Two design weaknesses: (1) the cache check was a single
    `or`-joined boolean expression, so when it tripped the log
    only said "mismatch detected" without naming the field —
    debugging required guessing; (2) the device-residency
    sub-check read `next(model.parameters()).device` and only
    inspected the FIRST parameter from the iterator. With
    bitsandbytes 4-bit quantization the parameter iteration
    order is non-deterministic and a CPU-resident metadata
    buffer (quant_state, embed_tokens with offload, dequant
    scratch) frequently lands first. The check then fired a
    false-positive eviction every phase boundary.
  fix: |
    (a) Replace the single-param probe with a scan of up to N
    parameters (N=8 is enough). Treat the cache as still-resident
    if ANY scanned param is on `cuda`. Use the model's own
    `.hf_device_map` attribute when accelerate is in play.
    (b) Replace the inline boolean cache check with explicit
    per-field delta collection — each of `device`, `quantized`,
    `model_id`, `budget_profile`, `VERSION`, `context_cap` is
    compared individually and recorded as
    `(name, cached, requested)` tuples.
    (c) The runtime log line names the specific drifted field(s)
    so future regressions are diagnosable on first glance.
  verify: |
    Across N phase-boundary transitions with identical inputs,
    the cache-mismatch log line never appears. Wall-clock from
    one phase to the next drops from ~17s to <1s.
  tags: [llm, cache-thrash, quantized-param-iter, device-check, opaque-log, bitsandbytes, xphase-06]
  legacy_id: BUG-LOCAL-065

- id: "12.41"
  phase: 12
  area: regression
  symptom: |
    A pipeline reports "Success" with a count (e.g. "polished
    19 -> 16 lines") but the very next stage reports a wildly
    different count ("AFTER_PARSE count=1"). 15 dialogue lines
    vanished silently between the two stages with no warning.
  cause: |
    Three independent structural asymmetries can combine to make
    a silent drop invisible: (1) a regex character class differs
    by one character (e.g. `[A-Z][A-Z0-9 ]` vs `[A-Z][A-Z0-9_ ]`)
    between the parser and every other counter, so underscore-
    containing names slip through every other check but die at
    the parser; (2) a "_post_total" counter is missing one of
    the patterns that "_pre_total" counts (asymmetric counter
    at the gate); (3) a rescue path fires only on raised
    exceptions, not on quantity floors, so "succeeded but
    produced too little" never triggers it.
  fix: |
    (a) Lock all "same-thing" regex character classes to a
    shared module-level constant so divergence is impossible.
    (b) Audit every `_pre_total` / `_post_total` pair for
    symmetry; both must count every variant of the relevant
    structure.
    (c) Add a quantity-floor rescue trigger: if expected >= K
    and the actual parse produced < 50% of expected, fire a
    rescue pass on the un-parsed text and adopt the rescued
    parse only if it recovers MORE than the original.
  verify: |
    Regression file with 20 tests covering: 7 underscore /
    spaced / mixed names exercise the regex symmetry; 5
    counter symmetry tests across all token forms; 6 floor-
    threshold tests covering the trigger zone, the no-trigger
    zone, and the close-enough-to-skip zones. All pass.
  tags: [pipeline-counter-asymmetry, parser-regex-divergence, silent-drop, rescue-on-floor, regex-shared-constant]
  legacy_id: BUG-LOCAL-066

- id: "12.42"
  phase: 12
  area: hygiene
  symptom: |
    A "single super-folder" output design was introduced (e.g.
    `output/myproject/`) but write paths drifted: some nodes write
    to the new tree, others still hardcode the old path. A media
    server / sync tool watching the new folder misses half the
    artifacts.
  cause: |
    Foldering was added incrementally without a single source of
    truth. Each write path was hardcoded at its call site. Intent
    was documented in roadmap docs but not enforced by code review
    or tests.
  fix: |
    (a) Centralise all write paths in a single helper module (e.g.
    `output_paths.py`). Every node imports from it, never
    hardcodes. (b) Add a regression test that asserts the write-
    path SHAPE of every node that exposes its output dir. (c)
    Never move existing files when migrating to a new folder —
    legacy consumers need a stable read path.
  verify: |
    Grep for hardcoded `output/<old_name>/` strings — zero matches
    except in migration-fallback code. All test assertions on path
    shape pass.
  tags: [output-foldering, centralised-helper, legacy-fallback, intent-not-enforced, super-folder]
  legacy_id: BUG-LOCAL-067

- id: "12.43"
  phase: 12
  area: regression
  symptom: |
    Two upstream stages emit a key naming the same logical entity
    in different forms (spaces vs underscores, ALL CAPS vs Title
    Case). A merge step keyed on raw strings does not collapse
    them, so the merged table has two rows for one entity. Voice/
    style/render assignments end up on the ghost row; downstream
    consumers see the speaking row and find `<assignment>=None`,
    falling back silently to defaults.
  cause: |
    Lookup mismatches across name-spaces are silent by default —
    they dont raise, they dont log, they just append a duplicate
    row. Two parsers that "should" produce the same key often
    diverge across JSON serialise/deserialise round-trips.
  fix: |
    Whenever two upstream stages produce keys for the same entity,
    define a shared normaliser and apply it on BOTH sides of every
    lookup. Persist the normalised form as the canonical one.
  verify: |
    Regression test that exercises the merge with realistic mixed-
    form inputs. Result: one row, both fields populated.
  tags: [name-namespace, normaliser, merge-key, silent-duplicate, canonical-form, normalizer]
  legacy_id: BUG-LOCAL-068

- id: "12.44"
  phase: 12
  area: ledger
  symptom: |
    Every node renders deterministic on-disk artifacts (WAV, PNG,
    MP4) but the canonical ledger has `wav_path=None` /
    `png_path=None` for those rows. Auditing which artifact backed
    which logical row requires globbing the cache directory by
    hash.
  cause: |
    Render nodes computed the deterministic cache_path before
    generation but never wrote it into the ledger. The Ledger
    classs `apply_*_paths()` methods existed for this purpose;
    nobody invoked them.
  fix: |
    Every node that renders a deterministic on-disk artifact MUST
    write the path back to the canonical ledger before the node
    returns. Pattern: at end of execute(), auto-discover the most
    recent `*_ledger.json`, walk relevant rows, stamp `path` and
    `dur_s`, write atomically. Wrap in try/except so a missing-
    ledger or write-failure logs a warning but never fails the
    node. Stamp BOTH cache-hit and freshly-generated paths.
  verify: |
    After a full pipeline run, every row in `ledger.music[]`,
    `ledger.sfx[]`, `ledger.shots[]` has a non-empty `path` field
    and a positive `dur_s` (where applicable).
  tags: [ledger, write-back, traceability, auto-discover, cache-stamping]
  legacy_id: BUG-LOCAL-095

- id: "12.45"
  phase: 12
  area: regression
  symptom: |
    A heuristic that fills in for a missing ledger field clumps
    results into the first N*K seconds because it uses a fixed-
    interval slot formula. Downstream consumers miss large portions
    of the timeline.
  cause: |
    Heuristics that ignore content scale poorly. A fixed-interval
    slot picker doesnt know that line 0 is 4 seconds and line 12
    is 12 seconds; every clip lands in lockstep.
  fix: |
    When a heuristic is needed at all, prefer one that scales WITH
    the available data: word_count, char_count, total duration.
    For per-line timings: `start = total_dur * (sum_words_so_far /
    sum_words_total)`. Preserve a priority chain so the heuristic
    auto-disables once the proper write-back lands. Log the
    heuristics outputs.
  verify: |
    Feed the consumer a ledger with `total_dur=300` and 30 lines
    of equal word_count. Spread across timeline is even (max - min
    within 5% of 300).
  tags: [heuristic, scaling, priority-chain, ledger-write-back, per-line-timings]
  legacy_id: BUG-LOCAL-094

- id: "12.46"
  phase: 12
  area: vram
  symptom: |
    A timeout wrapper around a long-running model call (e.g.
    `concurrent.futures.ThreadPoolExecutor`) fires its timeout. The
    next phase OOMs even though the timed-out model was supposed
    to be unloaded. nvidia-smi shows the models weights still
    resident.
  cause: |
    `ThreadPoolExecutor` does NOT cancel the worker thread on
    timeout — Python threads cant be cancelled. The worker keeps
    running with live references to the model. The cache dicts
    `del` drops only one reference; GC cannot collect because the
    abandoned thread still holds others. GPU memory stays pinned.
  fix: |
    Two-step: (a) before deleting cache references, call
    `cache["model"].cpu()` — even when other live references
    exist, `.cpu()` frees the CUDA tensors backing the weights;
    (b) avoid `ThreadPoolExecutor` for model calls entirely; use
    `signal`-based timeouts (POSIX) or accept full-completion
    semantics. Add `torch.cuda.synchronize()` before any `.cpu()`
    call.
  verify: |
    Force a timeout. Post-unload telemetry reads ~0.03 GiB
    allocated. Next phase loads cleanly. No
    cudaErrorIllegalAddress.
  tags: [vram, threadpoolexecutor, timeout, orphan-thread, cuda-synchronize, model-unload, xref-12.19, xphase-07]
  legacy_id: BUG-LOCAL-111

- id: "06.06"
  phase: 6
  area: caching
  symptom: |
    A specific model + hardware + quantization combination produces
    `CUDA error: device-side assert triggered` during inference.
    Other models in the same dropdown work fine on the same
    hardware.
  cause: |
    Empirical incompatibility between specific model architecture,
    specific quantization mode, specific hardware architecture,
    and specific upstream library versions. The failure mode is
    not theoretical — its a real combination that throws on first
    inference attempt.
  fix: |
    Class lesson: model-platform combinations need empirical
    compatibility testing, not assumed support. When you discover
    a known-bad combination, REMOVE that model from your nodes
    dropdown immediately. Add a one-liner CONSTANTS block
    documenting the diagnosis. Document the test gate in README so
    users on different hardware know they can re-enable.
  verify: |
    Dropdown does not list the incompatible model. CONSTANTS block
    + comment cite the failure signature and date.
  tags: [model-compat, quantization, blackwell, bitsandbytes, dropdown-filter, empirical-testing, xphase-07]
  legacy_id: BUG-LOCAL-110

- id: "07.16"
  phase: 7
  area: vram
  symptom: |
    A large GGUF video unet (e.g. LTX-2.3 22B audio-in) renders at a wild
    6.84-or-223 s/it lottery -- one beat ~54s, the next ~30 MIN -- often
    stalling at "0/8 Model Initializing". It is NOT an OOM; it just crawls.
    Per-step time swings ~30x at BYTE-IDENTICAL reported VRAM ("X usable,
    Y loaded, full load: True"); nvidia-smi shows only ~200 MiB free.
  cause: |
    Two compounding faults. (1) A VAE node wired to BOTH the pre-sampler
    (i2v encode) AND the post-sampler (decode) stays pinned in VRAM through
    the whole denoise loop, because the executor's free_after_use only
    releases a node after its LAST consumer runs -- so ~1.4 GB is stolen
    from the sampler. (2) On a desktop-VRAM-tight card (16 GB with ~5 GB
    eaten by Chrome/Electron desktop apps) the unet FULL-loads to the brim
    with ~0 activation room, so the per-step activation tensors spill to
    system RAM (NVIDIA "sysmem fallback") and crawl ~20-30x. Same symptom
    class as 11.07 / 07.01 / 07.03 (VRAM-pressure slowdown, no OOM), new trigger.
  fix: |
    (1) Split the dual-consumer VAE into two graph nodes (encode-side +
    decode-side) so free_after_use reclaims the encode VAE BEFORE the
    sampler. (2) Force a PARTIAL unet load by holding ~3 GB free for
    activations: bump comfy.model_management.EXTRA_RESERVED_VRAM (the real
    --reserve-vram global) around the graph run, restored in finally
    (exception-safe; never lower a higher operator reserve). The GGUF unet
    DOES honor partial load. Result: steady ~11 s/it, no spill, no lottery.
  verify: |
    A clean render shows the unet "loaded ... full load" with ~3 GB held
    free (usable = free - ~3.9 GB) and a steady per-step time, never spiking
    20x+; nvidia-smi keeps headroom through the sampler. Lower the reserve
    for more speed / less margin.
  tags: [vram, sysmem-fallback, activation-spill, partial-load, extra-reserved-vram, free-after-use, gguf, ltx, reserve, no-oom-crawl]
  legacy_id: ""

- id: "12.47"
  phase: 12
  area: harness
  symptom: |
    A headless soak/probe leg renders on the WRONG engine (or with wrong
    feature flags) even though the submitted workflow/profile is correct:
    the server log shows LOUD env-override lines (e.g. an engine force-map)
    that nobody in the current run set. Recurs across sessions -- a past
    cleanup note says "deleted so future boots are clean", then it happens
    again.
  cause: |
    The server launch script sources an OPTIONAL per-leg env hook file
    (extra "set X=Y" lines a playlist runner writes and is supposed to
    delete after its leg). A crashed/interrupted leg ORPHANS the hook, and
    the launcher then silently injects the stale env (engine force-maps,
    opt-in flags) into EVERY subsequent headless boot -- poisoning
    unrelated runs for days. File-based env leaks also survive User/
    Machine env-var audits, so the usual "check setx" diagnosis misses it.
  fix: |
    CONSUME-ONCE semantics in the launcher: when the hook exists, ECHO its
    contents LOUDLY into the server log, call it, then DELETE it -- one
    hook = one boot. Writers re-create the hook per leg, so the per-leg
    contract is preserved and a crash can no longer poison later boots.
    Generic rule: any "sourced side-file" a launcher honors must be
    consumed (or TTL-stamped) by the consumer, never left to accumulate
    on the writer's promise to clean up.
  verify: |
    The next boot's log shows either no hook line or the loud
    "consuming ... hook" block with the hook contents; the hook file is
    absent after any boot; a forced-engine probe leg's render histogram
    matches the engine the RUN configured (not the orphan's).
  tags: [harness, env-leak, headless-boot, launcher, orphan-file, consume-once, force-map, soak]
  legacy_id: BUG-LOCAL-415

- id: "11.26"
  phase: 11
  area: llm-output
  symptom: |
    A structured-call pass whose post-validator demands VERBATIM substrings
    of an earlier pass's text (e.g. key_terms copied from a concept) kills
    the whole pipeline loudly even when the model's answer is right in
    spirit: the model paraphrases ('grieving mother' for 'a mother,
    grieving'), or the copied phrase spans a line wrap in the source
    corpus. The generic repair turn re-paraphrases, the bounded retry
    ladder exhausts, and a production render dies in its first LLM stage.
  cause: |
    Two compounding faults. (1) The grounding check compared raw lowered
    strings, so a phrase that wraps across a newline (the corpus joins
    model fields with "\n") can NEVER match a single-line term -- a
    verbatim copy gets rejected. (2) Copy-exact is the one instruction
    small local models reliably fumble inside JSON emission, and the
    generic "fix the field" repair prompt neither names the verbatim
    contract nor offers a deterministic way out, so the repair attempt
    fails the same way and burns the ladder.
  fix: |
    (1) Whitespace-normalize BOTH sides of the verbatim test (collapse
    every whitespace run to one space, lowercase) -- still exact words in
    exact order, just wrap-proof. (2) Route the failure class to a TYPED
    repair: a deterministic call-site callback runs first (prune the
    ungrounded terms when enough verbatim survivors remain -- pure text
    filtering, no LLM spend, re-validated by the full gate), falling back
    to a directive that says COPY exact contiguous phrases and re-shows
    the source text. Generic rule: every "must quote the source verbatim"
    validator needs (a) whitespace-tolerant matching and (b) a
    deterministic subset-repair before any LLM re-roll. Two follow-on
    laws from the same live-smoke night: (c) a grounded quote proves the
    LINE EXISTS, not that it belongs to the CLASS -- for closed-
    vocabulary judge classes (a weapon must be NAMED to be heard on
    radio) the lexicon is the only kill authority and the confirm-quote
    path is reserved for open-phrasing classes; (d) any judge claim
    with a deterministically checkable core ("the closing line is
    absent") must be verified in code before it may kill -- the judge
    twice claimed a non-empty line it had just been shown was missing.
  verify: |
    A term that wraps across a line break in the source corpus grounds
    cleanly; a response with one paraphrased term among >= 2 verbatim
    terms finishes with NO second LLM call and the paraphrase pruned; a
    response with < 2 grounded terms takes the typed verbatim-copy repair
    turn and, if the model repeats itself, still fails loud after the
    bounded ladder. Statically: any file carrying an "anchor A2" style
    verbatim-grounding gate also carries a whitespace-collapse
    normalizer used on both sides of the substring test.
  tags: [llm-output, structured-call, post-validator, verbatim-grounding, whitespace-normalization, deterministic-repair, retry-ladder, repair-prompt, llm]
  legacy_id: ""


# ─────────────────────────────────────────────────────────────
# CHUNK 3 — Bulk fan-out from OTR PROD_BUG_LOG (2026-07-10/11)
# 23 entries promoted from live/prod-run bug staging under the
# Three-File Contract. legacy_id carries the originating PBUG id.
# ─────────────────────────────────────────────────────────────

- id: "02.15"
  phase: 2
  area: encoding
  symptom: |
    Detached headless boot (soak/API server launch) dies ~13 seconds in
    with exit code 1 and "SERVER DID NOT COME UP" in the log, even though
    the exact same launch works fine from an interactive terminal.
  cause: |
    A detached process (started via cmd.exe /c or Start-Process without an
    explicit encoding) inherits Windows' legacy cp1252 console codec, not
    UTF-8. Any print() in a startup-time script (prestartup_script.py, a
    custom node's module-level code, etc.) that emits a non-ASCII
    character -- most commonly a status emoji like a checkmark or
    cross-mark -- raises UnicodeEncodeError the instant it executes,
    killing the boot before the server ever binds its port.
  fix: |
    Set PYTHONUTF8=1 and PYTHONIOENCODING=utf-8 in the environment of
    every detached/headless launch path (launcher .cmd/.ps1), not just
    the interactive one. Any new boot path (soak harness, CI runner,
    scheduled task) must set both vars before invoking python.exe.
  verify: |
    Boot the server via the detached launcher and confirm PYTHONUTF8/
    PYTHONIOENCODING are present in its environment; the boot log shows
    no UnicodeEncodeError and the server reaches a listening state within
    the normal ~20s window. Grep every launcher script for PYTHONUTF8=1.
  tags: [windows, encoding, cp1252, headless, boot, launcher, unicode]
  legacy_id: PBUG-20260612-01

- id: "07.17"
  phase: 7
  area: vram
  symptom: |
    A full-episode VRAM soak measures a peak of 15.8GB against a 14.5GB
    ceiling, on both device modes, in a pipeline stage (LTX-AV) that
    combines a text encoder with a video generation pass.
  cause: |
    The text encoder (Gemma) stayed GPU-resident through the entire video
    pass instead of being released once its output was consumed, holding
    VRAM the video stage then had to compete for.
  fix: |
    Move the text encoder to CPU after its output is captured (attempted).
    A later re-measured soak PROVED this offload had NO effect on the
    measured peak, and the change was reverted. Record the disproof
    explicitly so the same offload isn't re-attempted blind on a future
    VRAM-ceiling rip -- re-derive the actual peak-VRAM contributor before
    trying an "obvious" fix.
  verify: |
    Full-episode soak reports peak VRAM; assert the measured peak matches
    the currently-accepted (reverted) architecture, not the offloaded one.
    Before proposing an encoder-offload fix for a similar VRAM-ceiling
    breach, re-soak once with the offload OFF to confirm it's still the
    right baseline.
  tags: [vram, soak, offload, text-encoder, ltx-av, disproven-fix]
  legacy_id: PBUG-20260616-01

- id: "11.27"
  phase: 11
  area: model-registry
  symptom: |
    Selecting a remote/cloud model slot (e.g. "openrouter:slot-a") crashes
    the episode at line-compose with a KeyError, even though the same code
    path works fine for every LOCALLY-curated model.
  cause: |
    The lookup did an exact-match dict access (rows[repo_id]) against a
    dict that was only ever populated from a CURATED, LOCAL model list.
    Remote/cloud model handles are never curated members of that dict, so
    the exact-match access always raises for them.
  fix: |
    Replace exact-match dict access with rows.get(repo_id) plus an
    explicit default (a generic/modern prompt profile) for any handle
    absent from the curated table, instead of assuming every valid model
    id is a member.
  verify: |
    Run with a remote/cloud model handle that is deliberately absent from
    the curated dict; assert the lookup falls back to the default profile
    and completes instead of raising KeyError. Grep any `dict[key]`
    lookup keyed by a user-selectable model handle and confirm it uses
    `.get()` with a documented default.
  tags: [llm-output, model-registry, keyerror, dict-lookup, remote-model, exact-match, llm]
  legacy_id: PBUG-20260618-01

- id: "07.18"
  phase: 7
  area: audio
  symptom: |
    A dedicated visualizer/render soak forcing edge-case beats (0-frame
    beats, fully silent beats) surfaces a cluster of four distinct
    crashes/misbehaviors in one soak run: no floor on 0-frame beats, no
    handling for an idle scope on a silent beat, an audio_ref check that
    over-gates valid input, and a master-audio slice that is never fed to
    a downstream consumer.
  cause: |
    Four separate missing guards, each independent: (1) no minimum-frame
    floor before a beat reaches frame-dependent logic, (2) no explicit
    handling path for an "idle" beat scope, (3) assert_usable() gated
    audio_ref too aggressively, rejecting legitimate input, (4) the b000
    master-audio slice was computed but never actually passed to the node
    that needed it.
  fix: |
    Add an explicit 0-frame floor before any frame-dependent computation;
    add an idle-scope branch that handles a silent beat without erroring;
    loosen the audio_ref gate in assert_usable to accept the valid case;
    wire the b000 master-audio slice through to its consumer.
  verify: |
    Run the visualizer soak forcing 0-frame beats, silent beats, and the
    audio_ref/master-slice edge cases together; every beat reaches
    status=success with none of the four original failure signatures.
  tags: [audio, video, visualizer, soak, 0-frame, idle-scope, audio-ref, master-audio]
  legacy_id: PBUG-20260618-02

- id: "08.07"
  phase: 8
  area: io
  symptom: |
    A PUBLISHED episode's bottom bars overlay renders flat/static or a
    solid color instead of tracking the audio -- the defect shipped all
    the way to a final published artifact, not just a dev render.
  cause: |
    The bars-overlay node read amplitude from the silent intermediate
    blend source used earlier in the compositing chain instead of the
    final master WAV that actually carries the mixed audio.
  fix: |
    Point the bars-overlay amplitude read at the master WAV, not the
    silent blend-stage source.
  verify: |
    Run the obs-final render pipeline; assert the bars overlay's
    amplitude trace correlates with the master WAV's amplitude envelope,
    not a flat/silent signal.
  tags: [io, audio-reactive, overlay, obs-final, published-artifact, silent-source]
  legacy_id: PBUG-20260620-01

- id: "05.10"
  phase: 5
  area: python-scoping
  symptom: |
    Every episode crashes at execution with UnboundLocalError, but only in
    a specific heavy node the unit-test suite never actually exercises.
  cause: |
    A local `import os` statement anywhere inside a function body makes
    `os` a LOCAL name for the ENTIRE function, even on lines executed
    before that import line runs. A meta-stamp line earlier in the same
    function referenced os.environ, and Python resolved `os` as the
    (not-yet-assigned) local rather than the module-level import, raising
    UnboundLocalError.
  fix: |
    Move the local import to the top of the function (or remove it in
    favor of the existing module-level import) so no name inside the
    function is ambiguous between local and global scope.
  verify: |
    An end-to-end test exercises the meta-stamp code path in the heavy
    node specifically (not just the light nodes the suite already
    covers). Lint/grep for any function containing both a
    module-level-shadowing `import X` and a reference to `X` earlier in
    the same function body.
  tags: [python, scoping, unboundlocalerror, shadowed-import, execution-model]
  legacy_id: PBUG-20260622-01

- id: "07.19"
  phase: 7
  area: audio
  symptom: |
    A pre-freeze sweep re-roles an ANNOUNCER-named cast row to an
    ordinary character role, sending it to a voice engine that cannot
    handle it and crashing with EngineUnusable.
  cause: |
    The cast-role-coercion function had no naming-convention exemption
    for a row whose cast id/name IS the announcer -- it treated every row
    as an ordinary candidate for role coercion.
  fix: |
    Exclude ANNOUNCER-named rows from role coercion explicitly, by
    name/id, before the coercion logic runs.
  verify: |
    Run an episode with the announcer keyed as an ordinary cast id (the
    trigger condition) and confirm it renders clean, without being
    re-roled or reaching the character voice engine.
  tags: [audio, casting, announcer, role-coercion, naming-convention]
  legacy_id: PBUG-20260622-02

- id: "07.20"
  phase: 7
  area: audio
  symptom: |
    A dialogue row whose content is PURE stage direction (zero spoken
    words) reaches the voice engine and crashes the render.
  cause: |
    No handling existed for a dialogue row that is degenerate -- all
    stage direction, no actual speech -- before it was handed to TTS.
  fix: |
    Recompose the row into real dialogue at the source (root fix) when
    possible; where recomposition isn't available, fall back to a
    silence backstop rather than crashing (flagged: a fail-soft backstop
    conflicts with a stricter no-fallback law adopted later -- re-evaluate
    against current policy before reusing this backstop).
  verify: |
    Force a stage-direction-only line through the pipeline; assert
    either the recompose path fires (real dialogue) or a controlled
    silence backstop, and in neither case does the render crash.
  tags: [audio, tts, stage-direction, degenerate-content, silence-backstop]
  legacy_id: PBUG-20260622-03

- id: "09.05"
  phase: 9
  area: cloud-api
  symptom: |
    A cloud music-generation API call is rejected with HTTP 422
    provider_rejected on short-duration requests.
  cause: |
    The requested clip duration was under the provider's documented
    minimum, and no floor was applied before sending the request.
  fix: |
    Apply a minimum-duration floor (request at least the provider
    minimum) and trim the result back down to the originally intended
    duration after generation.
  verify: |
    Request a duration below the provider's documented minimum; assert
    the outbound request is floored to the minimum and the call
    completes without a 422.
  tags: [cloud-api, network, contract, http-422, duration-floor]
  legacy_id: PBUG-20260704-01

- id: "09.06"
  phase: 9
  area: cloud-api
  symptom: |
    A cloud image-generation node call crashes with "TypeError: string
    indices must be integers".
  cause: |
    The node's Python-side model parameter expects a structured
    DYNAMICCOMBO-style dict, but the caller sent a bare model-name string
    -- the contract for what shape the model parameter must take varies
    PER cloud node even within the same provider family, so a pattern
    that works for one sibling node (a bare string) fails for another.
  fix: |
    Send the model parameter as the expected dict shape for this
    specific node rather than assuming the bare-string contract from a
    sibling node.
  verify: |
    Call the affected cloud node live; assert it completes instead of
    raising TypeError. Before reusing a call pattern across cloud nodes
    from the same provider, confirm each node's actual expected shape
    rather than assuming uniformity.
  tags: [cloud-api, contract, dict-vs-string, typeerror, provider-variance]
  legacy_id: PBUG-20260704-02

- id: "07.21"
  phase: 7
  area: audio
  symptom: |
    Two logically distinct voice ids resolve to the same underlying WAV
    file even when the caller explicitly disallows voice reuse.
  cause: |
    No check existed for the case where two different ids collide on the
    same underlying asset/provider identity -- the no-reuse gate only
    checked the requested id, not the resolved asset behind it.
  fix: |
    Add a same-asset/same-provider collision check that fires whenever
    allow_voice_reuse=False, independent of whether the requested ids
    differ.
  verify: |
    Resolve N voice ids under allow_voice_reuse=False; assert all N
    resolved WAV file hashes are distinct.
  tags: [audio, tts, voice-reuse, collision, asset-identity, no-fallback]
  legacy_id: PBUG-20260709-01

- id: "11.28"
  phase: 11
  area: llm-output
  symptom: |
    A creative-slot LLM's structured JSON output is truncated mid-object,
    causing schema failures in every downstream consumer, even though the
    requested context window (n_ctx) should have been large enough to
    hold the full response.
  cause: |
    The selected local quant (Q8 of a 4B-class model) cannot actually
    hold the requested n_ctx (4096) within the available VRAM; the
    loader silently downgraded to a smaller n_ctx (2048) instead of
    raising, so the caller had no signal that its context budget had
    been cut.
  fix: |
    Swap the affected slot to a model/quant combination that fits the
    requested n_ctx (root fix for this slot); separately, make every
    silent n_ctx downgrade in the loader RAISE instead of downgrading
    quietly, so any future capacity mismatch fails loud immediately
    rather than corrupting output downstream.
  verify: |
    Request an n_ctx above a given quant's actual capacity; assert the
    loader raises rather than silently returning a smaller context.
  tags: [llm-output, n_ctx, silent-downgrade, quantization, vram, truncation, llm]
  legacy_id: PBUG-20260710-01

- id: "11.29"
  phase: 11
  area: llm-output
  symptom: |
    A structured-call reroll path (e.g. a targeted revision retry) throws
    a jinja TemplateError mid-render.
  cause: |
    The reroll path emitted two consecutive user-role messages back to
    back; the chat template enforces strict user/assistant alternation
    and has no tolerance for two user turns in a row.
  fix: |
    Fold the reroll content into a SINGLE user message instead of
    appending a second one, preserving strict role alternation.
  verify: |
    Construct a reroll that would previously have emitted two
    consecutive user messages; assert the message list strictly
    alternates roles before it is sent to the chat template.
  tags: [llm-output, chat-template, jinja, role-alternation, reroll, llm]
  legacy_id: PBUG-20260710-04

- id: "11.30"
  phase: 11
  area: llm-output
  symptom: |
    A structured casting-JSON call truncates at its token ceiling; the
    salvage path extracts a partial object that then fails schema
    validation.
  cause: |
    The 1000-token budget allotted to the pass was too small for the
    full structured payload being requested, so truncation-then-salvage
    fired on essentially every call rather than as a rare edge case.
  fix: |
    Raise the token budget (1000 -> 1400) for this pass, and make the
    pre-validator tolerant of an expected wrapper shape so a
    well-formed-but-wrapped payload doesn't need the salvage path at all.
  verify: |
    Run a near-ceiling casting payload through the pass; assert it
    completes without the salvage path firing. This is the same
    token-ceiling truncation-then-salvage class recurring across
    multiple lanes -- check any new structured pass's token budget
    against its actual payload size before shipping.
  tags: [llm-output, token-budget, truncation, salvage, casting, structured-output, llm]
  legacy_id: PBUG-20260710-05

- id: "11.31"
  phase: 11
  area: llm-output
  symptom: |
    A roll dies on WORD_BUDGET exhaustion (e.g. 54 words returned against
    a 24-36 word acceptance band) even though the deviation is small in
    absolute terms.
  cause: |
    The acceptance band was sized as a flat +/-20% of the target word
    count. At a small target (e.g. 30 words) that proportional band is
    only ~12 words wide -- far too narrow for normal LLM length variance
    at small targets, even though the same +/-20% is reasonable at large
    targets.
  fix: |
    Add an absolute slack floor (+/-25 words) that governs at small
    targets; let the proportional (+/-20%) band take over only once the
    target is large enough (>=125 words) that the proportional band is
    wider than the floor.
  verify: |
    Unit test the word-band function at target=30 and confirm the
    absolute floor (not the proportional percentage) governs the
    accepted range. This same defect class was independently flagged,
    unfixed, in another lane at small word targets -- generalize the fix
    rather than patching one call site.
  tags: [llm-output, word-budget, proportional-band, small-targets, unit-test, llm]
  legacy_id: PBUG-20260710-06

- id: "11.32"
  phase: 11
  area: llm-output
  symptom: |
    A postamble/announcer row arrives downstream with
    speaker_role=character, skip=True, tts_skip_reason=null, after a
    fully green multi-pass pipeline run -- with NO compose-flag
    breadcrumb anywhere explaining the mutation.
  cause: |
    UNKNOWN / UNIDENTIFIED. An unsanctioned, cast-keyed mutator somewhere
    downstream flips the announcer row's fields without stamping a
    reason. Root mutator was NOT found despite investigation; this entry
    documents a mitigation, not a fix.
  fix: |
    Partial mitigation only: give the announcer row a sentinel char_id
    that exempts it from cast-keyed mutation paths, so the class of bug
    (any cast-keyed path touching the announcer) can no longer fire even
    though the specific offending path is still unidentified.
  verify: |
    NON-TESTABLE by static analysis -- the obligation is to TRACE every
    cast-keyed mutation path and assert none of them can flip the
    announcer's role/skip/reason fields without stamping a reason; this
    requires runtime instrumentation across the full pass sequence, not
    a file-level check. Treat the sentinel as a stopgap and keep the
    root-cause hunt open.
  tags: [llm-output, silent-mutation, unidentified-root-cause, announcer, sentinel, data-corruption, llm]
  legacy_id: PBUG-20260710-07

- id: "11.33"
  phase: 11
  area: llm-output
  symptom: |
    A model injects one of its own fictional/invented characters into a
    pass that is supposed to be a READ-ONLY rendering of real news
    content.
  cause: |
    No gate existed to catch invented cast names leaking into the
    real-source read pass -- the model treated the read pass as
    continuous with its fictional narrative rather than as verbatim
    source material.
  fix: |
    Add a cast-name-in-read gate that checks the read-pass output
    against the known fictional-cast roster and rejects with a teaching
    error (repair prompt) if a fictional name appears.
  verify: |
    Construct a fixture where a fictional cast name appears in the read
    output; assert the gate rejects it and issues the repair prompt
    rather than letting it through.
  tags: [llm-output, fiction-fact-bleed, cast-name, gate, real-news, source-fidelity, llm]
  legacy_id: PBUG-20260710-08

- id: "11.34"
  phase: 11
  area: llm-output
  symptom: |
    An otherwise clean, passing draft gets killed solely because its
    CODA section ends with a period instead of the required colon.
  cause: |
    The colon is structurally load-bearing to a downstream parser, but
    the model treats terminal punctuation as a stylistic choice; there
    was no normalization step before the structural check ran, so a
    semantically-equivalent period triggered a false kill.
  fix: |
    Normalize the CODA's terminal punctuation (pivot a trailing period
    to the required colon) in the shared pre-lex step before the
    structural check runs. Flagged: this fixes the punctuation
    false-kill, but an inner sentence-break defect in the same draft
    class remains a separate, real issue to track.
  verify: |
    Construct a CODA ending in '.'; assert it normalizes to ':' before
    parsing and does not trigger a false kill.
  tags: [llm-output, structural-punctuation, false-kill, normalization, parser-contract, llm]
  legacy_id: PBUG-20260710-09

- id: "11.35"
  phase: 11
  area: llm-output
  symptom: |
    A structured pass returns a fact whose cited source_spans quote does
    not match the actual payload slice at the given offsets; the
    validator halts the lane before any downstream dialogue/media spend.
  cause: |
    The repair prompt was not explicit that the field/start:end slice
    must be an exact, literal identity against the payload -- the
    model's typed repair attempt reproduced the same mismatch because
    the contract wasn't spelled out concretely enough to fix it.
  fix: |
    Harden the repair prompt to show the required
    payload[field][start:end] identity explicitly, plus slice-mismatch
    diagnostics, applied uniformly across every lane sharing this
    contract shape (a cross-lane audit found the same gap in multiple
    independent lanes).
  verify: |
    Construct an offset-span mismatch fixture; assert it converges to a
    correct span within the bounded repair-ladder budget. This is the
    first member of a P0 evidence-contract defect class -- check any
    new lane sharing the source_spans contract for the same gap.
  tags: [llm-output, source-spans, evidence-contract, repair-prompt, validator, cross-lane, llm]
  legacy_id: PBUG-20260710-10

- id: "11.36"
  phase: 11
  area: llm-output
  symptom: |
    A model returns evidence IDs in an unpadded shape (F0, F1, F2) where
    the schema contract requires zero-padded IDs (F01, F02, F03); the
    validator halts the lane on the shape mismatch.
  cause: |
    The typed-repair contract didn't give the model explicit lexical ID
    mappings, so the zero-padding requirement was only implicit and the
    model reproduced its own unpadded convention.
  fix: |
    Tighten the repair contract with explicit lexical ID mappings plus a
    recompute-quotes-from-payload-slice instruction, applied uniformly
    across every lane sharing the contract, while leaving dialogue
    content untouched (only the deterministic metadata repair is
    affected).
  verify: |
    Construct a fixture returning unpadded IDs; assert the repair
    converges to the correctly zero-padded shape within the
    repair-ladder budget. Pin the required pad width directly in schema
    tests so a future contract change can't silently drop it.
  tags: [llm-output, evidence-id, zero-padding, schema-contract, repair-ladder, llm]
  legacy_id: PBUG-20260711-01

- id: "11.37"
  phase: 11
  area: llm-output
  symptom: |
    After an evidence-ID repair converges to the correct shape, the SAME
    quote is repeated with WRONG start/end offsets -- a separate,
    span-integrity P0 failure the validator correctly halts on.
  cause: |
    The repair contract fixed the ID-shape defect but did not force
    offsets to be recomputed against the actual payload slice, so a
    structurally-correct ID could still carry a stale/wrong offset pair.
  fix: |
    Ship a fail-closed, METADATA-ONLY repair module that may reindex an
    EXACT quote already present in the source and normalize IDs, but may
    NOT invent or rewrite any dialogue content. Dialogue-level rewrites
    are reserved for a separate, later, context-aware creative pass --
    never a blind mechanical patch or a context-free LLM retry that
    could break story continuity.
  verify: |
    Construct an offset-shifted but EXACT-quote fixture; assert it
    reindexes deterministically. Assert the ID normalizer maps F0 -> F01
    (not F00 -- an actual off-by-one defect was caught validating this
    fix). Assert the dialogue field is byte-identical before and after
    the repair.
  tags: [llm-output, span-integrity, offset-repair, metadata-only, fail-closed, dialogue-preservation, llm]
  legacy_id: PBUG-20260711-02

- id: "11.38"
  phase: 11
  area: llm-output
  symptom: |
    A typed structured-output pass returns legacy Markdown prose on its
    first attempts, then a legacy-shaped score object missing required
    schema keys (with extra unrelated keys) on the typed repair attempt;
    the strict validation ladder halts before any dialogue/media spend.
  cause: |
    The prompt/seam said "JSON only" but never named the exact current
    schema's required top-level keys, so the model copied the shape of
    its OWN input (a different, legacy structure) instead of the
    requested typed artifact.
  fix: |
    Append the exact required top-level schema keys to every typed pass
    and repair seam across all lanes sharing the contract, and
    explicitly forbid Markdown/prose output, while preserving full story
    context.
  verify: |
    Capture a typed-pass prompt for each affected lane; assert the exact
    required top-level schema keys are named in the prompt text. Live
    smoke must reach the next pass without legacy-key drift.
  tags: [llm-output, structured-output, schema-drift, legacy-shape, markdown, repair-seam, llm]
  legacy_id: PBUG-20260711-03

- id: "12.48"
  phase: 12
  area: concurrency
  symptom: |
    Intermittent save failures occur during a refine loop, specifically
    racing against a concurrent freeze cascade.
  cause: |
    A loser-directory cleanup step (removing the losing revision's
    working directory after a refine pass) raced against the freeze
    cascade, which could be reading/finalizing that same directory at
    the same time.
  fix: |
    Ship the LAST revision as the winner and drop the racing cleanup
    step entirely rather than trying to synchronize it against the
    freeze cascade.
  verify: |
    Run the refine loop repeatedly under load; assert zero save failures
    and that the freeze lands cleanly every time. This is a race class
    -- any future cleanup code added near the freeze cascade should be
    checked for the same race before shipping.
  tags: [concurrency, race-condition, refine-loop, freeze-cascade, cleanup]
  legacy_id: PBUG-20260623-01

- id: "11.39"
  phase: 11
  area: llm-output
  symptom: |
    A source-derived creative lane produces a structurally valid story that
    abandons its supplied source constraints, for example by turning ordinary
    objects into speculative artifacts or replacing the promised resolution
    with a genre invention.
  cause: |
    Source provenance was represented as opaque IDs or broad prose rather than
    as an immutable, literal grounding contract carried through every authored
    artifact and its audit boundaries.
  fix: |
    Derive a small immutable grounding contract containing the source's exact
    object, mechanism, and resolution anchors. Require those anchors at their
    owned score and spoken-script locations, validate them after every retake,
    and keep visual-style instructions on a separate channel that cannot alter
    any story message.
  verify: |
    Remove one required source literal from an otherwise valid artifact and
    assert the exact owning coordinate fails before publication. Switch only a
    visual-style setting and assert captured story messages remain byte-identical.
  tags: [llm-output, source-grounding, provenance, literal-anchor, channel-isolation, fail-closed, llm]
  legacy_id: PBUG-20260712-04

- id: "11.45"
  phase: 11
  area: llm-output
  symptom: |
    A structured response uses a plausible but non-canonical ownership shape:
    it packs several owned values into suffixed fields, nests a declared
    top-level collection inside a caller row, or puts a complete child
    collection under a parent that does not own it.
  cause: |
    Row schemas validated local fields but not canonical collection placement
    and exact ownership. A model could therefore return syntactically useful
    data in the wrong depth or cardinality, and a typed retry could repeat it.
  fix: |
    Define exact collection ownership and canonical depth at every nested row
    boundary. At the accepted typed-object boundary, lift or project only
    provably authoritative declared data into its canonical location, reject
    ambiguous, suffixed, or unknown shapes, and re-run the complete graph
    validator after projection.
  verify: |
    Test suffixed owned fields, a complete top-level collection nested in a
    caller row, and a complete child collection nested under the wrong parent.
    Assert the deterministic repair preserves authoritative values, produces
    the canonical shape for base and typed-repair responses, and fails closed
    for ambiguous or graph-invalid input.
  tags: [llm-output, schema-ownership, collection-placement, canonical-shape, typed-repair, fail-closed, llm]
  legacy_id: PBUG-20260712-01

- id: "11.40"
  phase: 11
  area: llm-output
  symptom: |
    A deterministic schema or ownership repair works on an initial model
    response but is skipped on a typed-repair response, allowing forbidden
    metadata, malformed collection placement, or duplicate ownership to reach
    the accepted artifact boundary.
  cause: |
    The repair was attached to one response factory or early parse branch
    instead of the single canonical boundary that validates every raw and
    repaired representation before acceptance.
  fix: |
    Put each proven-safe projection at the typed accepted-object boundary.
    Apply it to base and repair responses before the complete validator runs;
    preserve all non-owned authored fields, and reject an unknown or ambiguous
    shape rather than broadening a mechanical repair into content rewriting.
  verify: |
    Feed the same eligible defect through both the base and typed-repair
    response paths. Assert both converge through the projection, authored
    fields remain unchanged, and an out-of-scope shape still fails closed.
  tags: [llm-output, acceptance-boundary, deterministic-projection, typed-repair, ownership, fail-closed, llm]
  legacy_id: PBUG-20260712-06

- id: "11.41"
  phase: 11
  area: llm-output
  symptom: |
    An artifact contains two independent mechanical defects, but each safe
    normalizer refuses to run until the other defect is already absent, so the
    global validator can never see the jointly repaired artifact.
  cause: |
    Each projection was coupled to full-artifact validity instead of exposing
    a narrow, independently safe transform that can compose with other
    declared transforms before final validation.
  fix: |
    Factor each safe normalizer into a bounded projector and a full-validation
    wrapper. Apply only declared disjoint projectors in deterministic order,
    preserve authored content and chronology, then run the complete validator
    once over their shared result.
  verify: |
    Construct a fixture with both eligible defects in base and typed-repair
    responses. Assert the composed projection changes only owned fields,
    maintains deterministic order, and leaves an unrelated invalid condition
    rejected by the complete validator.
  tags: [llm-output, projection-composition, deterministic-order, canonical-validation, preservation, llm]
  legacy_id: PBUG-20260712-11

- id: "11.42"
  phase: 11
  area: llm-output
  symptom: |
    A full score or script is regenerated to correct one localized semantic
    omission, causing context-window overflow or repeating the omission while
    needlessly risking already-valid structure and prose.
  cause: |
    The repair ladder treats a missing fact in one explicitly owned leaf as a
    whole-document failure instead of distinguishing local semantic repair
    from structural or global-contract repair.
  fix: |
    Derive a minimal typed patch plan from immutable contract evidence. Allow
    the model to replace only the named leaf fields; require exact one-for-one
    target coverage, required literal anchors, no out-of-scope edits, and a
    complete merged-artifact validation. Unknown or broader defects remain
    fail-closed on the normal ladder.
  verify: |
    Remove one immutable literal from an otherwise valid score and script.
    Assert a small typed patch repairs only its planned target, rejects missing
    or unplanned targets, leaves every other field byte-identical, and clears
    the complete artifact validator.
  tags: [llm-output, bounded-patch, typed-schema, localized-repair, context-window, fail-closed, llm]
  legacy_id: PBUG-20260712-12

- id: "11.43"
  phase: 11
  area: llm-output
  symptom: |
    A narrow patch adds the newly missing literal but erases another immutable
    literal that was already valid in the same replaced field.
  cause: |
    The patch plan captured only the triggering omission and its validator
    checked patch-local coverage rather than the merged canonical artifact.
  fix: |
    Include every immutable invariant already present in each selected target,
    as well as newly missing requirements. Merge in memory and validate the
    complete canonical artifact at the structured-call boundary; return the
    precise merged-contract failure to the bounded retry ladder.
  verify: |
    Make a selected field contain one valid immutable literal and omit another.
    Assert the plan demands both, reject a patch that preserves only the new
    literal, and reject any patch whose merged artifact breaks graph, safety,
    grounding, or authorship validation.
  tags: [llm-output, bounded-patch, invariant-preservation, merged-validation, grounding, safety, llm]
  legacy_id: PBUG-20260712-13

- id: "11.44"
  phase: 11
  area: llm-output
  symptom: |
    An initial authoring pass has a guarded local-repair boundary, but a blind
    listener, optional polish, or final-audit retake bypasses it and reintroduces
    the same localized contract failure.
  cause: |
    The guarantee was attached to one call site rather than to the artifact's
    shared acceptance boundary, leaving later reauthoring routes with a weaker
    contract.
  fix: |
    Factor one guarded authoring helper for every route that returns the same
    artifact. It must accept structural/safety-valid output, invoke the bounded
    patch only for eligible local contract failures, validate the merged result,
    and expose the seam plus pass-specific receipt in the pipeline registry.
  verify: |
    Force a retake route to omit the same immutable literal repaired during
    initial authoring. Assert it invokes the shared small patch, records a
    pass-specific journal ID, reruns the downstream audit, and that every
    pipeline route advertises the repair seam.
  tags: [llm-output, shared-boundary, retake, bounded-patch, pipeline-contract, audit-receipt, xref-11.40, llm]
  legacy_id: PBUG-20260712-15

- id: "12.49"
  phase: 12
  area: metadata-provenance
  symptom: |
    A custom production lane writes a title, source label, or other provenance
    field that belongs to a different lane because shared defaults are stamped
    after the lane has made its own authoritative decision.
  cause: |
    Metadata ownership was implicit and a generic post-processing path
    overwrote a content-owned field instead of respecting the producing lane's
    explicit receipt.
  fix: |
    Assign one authoritative producer for each provenance field. Stamp the
    producer's receipt at the ownership boundary, preserve it through shared
    orchestration, and validate that published metadata agrees with the
    accepted artifact and selected source bank.
  verify: |
    Run two custom lanes with distinct title/source receipts through shared
    orchestration. Assert each published ledger preserves its own authoritative
    values and a conflicting generic default is rejected or ignored.
  tags: [metadata, provenance, ownership, ledger, source-bank, publication]
  legacy_id: PBUG-20260712-05

- id: "12.50"
  phase: 12
  area: test-orchestration
  symptom: |
    A detached smoke supervisor reports failure from a blank child exit code
    even though the canonical runner emitted explicit success and the required
    published asset and ledger exist.
  cause: |
    The supervisor treated an unavailable process-property read as a terminal
    failure without reconciling the runner's authoritative completion record.
  fix: |
    Define an ordered terminal-evidence contract: a real nonzero child exit or
    missing canonical success remains failure; a blank exit code may be treated
    as success only when the authoritative runner result and required durable
    output checks both pass. Record the reconciled verdict and evidence.
  verify: |
    Exercise a detached successful run whose child exit property is blank and
    assert the supervisor records PASS only with canonical success plus output
    checks. Repeat without the success marker or required asset and assert it
    remains a failure.
  tags: [test-orchestration, detached-process, exit-code, false-negative, durable-output, smoke-test]
  legacy_id: PBUG-20260712-16

- id: "11.46"
  phase: 11
  area: llm-output
  symptom: |
    A source-evidence row quotes text that exists in the payload but names the
    wrong source field or stale offsets, or it quotes a claim that does not
    exist literally in any allowed source field.
  cause: |
    Evidence validation checked a model-supplied field/offset tuple without a
    deterministic, fail-closed reconciliation against the actual source
    payload, allowing stale metadata and unsupported claims to share a repair
    path.
  fix: |
    Rehome an exact quote only when exactly one allowed source field contains
    it, then recompute offsets from that field. Retain only rows whose evidence
    is literal; drop unsupported facts during metadata-only repair, and fail
    closed for absent or ambiguous evidence. Never rewrite claim prose to make
    it appear supported.
  verify: |
    Test a unique exact quote with the wrong field and offsets, an exact quote
    found in multiple fields, and a paraphrased/unsupported claim. Assert only
    the unique literal quote is rehomed and reindexed; ambiguous or unsupported
    evidence cannot reach the accepted artifact.
  tags: [llm-output, source-evidence, field-provenance, offset-repair, literal-grounding, fail-closed, xref-11.37, llm]
  legacy_id: PBUG-20260711-04

- id: "11.47"
  phase: 11
  area: llm-output
  symptom: |
    A response begins with a malformed structured artifact containing a valid
    nested object, and a fallback parser promotes that child to the top level,
    hiding the outer corruption and producing misleading downstream errors.
  cause: |
    Best-effort brace scanning did not distinguish leading prose before one
    valid object from a malformed attempted root object containing descendants.
  fix: |
    Treat an invalid leading root object as a parse failure. Permit extraction
    only when leading non-JSON prose clearly precedes one complete top-level
    object; never salvage a nested child from a broken outer response.
  verify: |
    Feed malformed outer JSON containing a valid nested child and assert a
    top-level parse failure. Feed leading prose followed by one valid root
    object and assert normal parsing still succeeds.
  tags: [llm-output, json-parser, root-integrity, nested-object, parse-failure, fail-closed, json-parse, llm]
  legacy_id: PBUG-20260711-05

- id: "11.48"
  phase: 11
  area: llm-output
  symptom: |
    A structured artifact or its typed repair preserves top-level shape but
    omits nested required fields, violates cross-object locks, repeats legacy
    metadata enums, or leaves derived structural metadata inconsistent with an
    already accepted upstream graph.
  cause: |
    The repair prompt lacked a complete machine-derived field tree, the failed
    artifact/error context, or the authoritative upstream mappings needed to
    preserve graph-owned metadata. The model was asked to recreate mechanical
    structure it did not own.
  fix: |
    Generate required-path instructions from the current schema and include
    the failed artifact, exact error, preservation rules, and accepted
    cross-object mappings in typed repair. Derive eligible mechanical metadata
    deterministically from the accepted graph; never alter authored prose, and
    reject missing, ambiguous, or graph-inconsistent mappings.
  verify: |
    Force a nested required-field omission, a missing cast-locked speaker, a
    missing boundary, and a legacy metadata enum. Assert the repair contract
    names the complete required paths and authoritative mappings; deterministic
    metadata repair changes only owned fields and fails closed for bad graphs.
  tags: [llm-output, nested-schema, typed-repair, graph-metadata, deterministic-repair, preservation, llm]
  legacy_id: PBUG-20260711-06

- id: "11.49"
  phase: 11
  area: source-selection
  symptom: |
    A canonical source selector returns a thin or low-diversity payload that
    cannot meet the downstream lane's source contract, wasting a model slot or
    halting after queueing work.
  cause: |
    Candidate ranking optimized for topic match without enforcing the same
    minimum body-length, word-count, and lexical-diversity floor required by
    the selected creative lane.
  fix: |
    Apply the lane's source-sufficiency contract during candidate selection.
    Inspect a bounded candidate set, select only an eligible payload, and fail
    before queueing the lane with a precise selection reason when none qualify.
  verify: |
    Supply a ranked candidate list containing thin and eligible bodies. Assert
    selection skips thin candidates, returns an eligible source with its
    receipt, and fails before model dispatch when every candidate is below the
    declared floor.
  tags: [source-selection, source-sufficiency, precondition, rss, fail-before-spend, payload-quality]
  legacy_id: PBUG-20260711-11

- id: "11.50"
  phase: 11
  area: llm-output
  symptom: |
    A whole-artifact pass reserves output tokens from a word target or fixed
    ceiling alone, truncates its own schema-bearing prompt or serialized
    response, and may echo the request envelope instead of returning the
    requested artifact root.
  cause: |
    Budgeting ignored accepted line/item count and required per-item metadata,
    while the root contract failed to forbid input-envelope keys explicitly.
  fix: |
    Calculate output reservation from every structural size driver, including
    accepted line or item count, after the authoritative graph is final. Record
    the budget receipt, require the requested root literal at response start,
    forbid request-envelope keys, and fail loud when prompt plus output cannot
    fit the actual context window.
  verify: |
    At fixed word steer, increase accepted line count and assert the reservation
    rises. Assert the effective prompt retains every required schema path,
    envelope-root output is rejected, and an insufficient context cap fails
    before generation rather than silently truncating.
  tags: [llm-output, token-budget, context-window, structured-output, envelope-echo, fail-loud, xref-11.30, llm]
  legacy_id: PBUG-20260711-12

- id: "12.51"
  phase: 12
  area: metadata-provenance
  symptom: |
    A content-owned lane reaches a downstream TTS, credits, or cast stage with
    a missing producer receipt, or a generic receipt is written into a key that
    actually asserts a stronger behavior contract and triggers an invalid
    replay path.
  cause: |
    Shared orchestration assumed legacy producers owned delivery and seed
    metadata. A field whose name looked like a generic receipt also doubled as
    proof that a specific producer had created replayable state.
  fix: |
    Stamp required receipts at the one shared producer boundary after the last
    authoritative content mutation and before finalization. Assign one precise
    semantic purpose to each key: use a generic episode receipt for provenance,
    and reserve replay keys exclusively for the producer that can substantiate
    replayable state. Preserve lane-owned cast values while still running their
    safety invariants.
  verify: |
    Run a content-owned lane through delivery, credits, and cast stages. Assert
    delivery and episode receipts exist before finalization, no replay-only key
    is fabricated, lane-owned voices are not replayed, and duplicate or invalid
    lane-owned voices still fail their safety gate.
  tags: [metadata, producer-boundary, receipts, cast-replay, content-owned, provenance, xref-12.49]
  legacy_id: PBUG-20260711-14

- id: "07.22"
  phase: 7
  area: vram
  symptom: |
    An audio-conditioned video run avoids an OOM but slows from seconds to
    minutes per iteration as sampler activations spill to system memory on a
    desktop-VRAM-tight machine.
  cause: |
    A large VAE graph object was shared by both pre-sampler encode and
    post-sampler decode, so last-consumer lifetime kept it resident through
    denoising. Model loading also had no scoped activation reserve for desktop
    applications already occupying VRAM.
  fix: |
    Split encode-side and decode-side heavy graph resources when their lifetimes
    do not overlap, and apply a scoped minimum VRAM reserve for the model run.
    Restore the prior reserve on both success and exception; never lower an
    existing stricter reserve. Diagnose slow no-OOM behavior from real telemetry
    before changing quantization or offload policy.
  verify: |
    Assert the graph has distinct encode and decode VAE nodes with correct
    wiring. With a fake model manager, assert the scoped reserve rises during
    execution, restores after success and failure, and preserves a larger
    pre-existing reserve. GPU soak telemetry must confirm no sysmem-spill crawl.
  tags: [vram, activation-reserve, video-vae, sysmem-spill, scoped-resource, gpu-soak, xref-07.16]
  legacy_id: BUG-LOCAL-414

- id: "08.08"
  phase: 8
  area: io
  symptom: |
    A final post-composition render publishes successfully but silently loses
    captions, scopes, or rolling-credit tail frames because an optional ffmpeg
    filter branch is malformed or a shortest-input rule truncates the intended
    long-form output.
  cause: |
    The successful-output path was treated as proof of visual completeness.
    A concatenated filter duplicated a pixel-format token without its separator,
    triggering a source-copy fallback, and a separate shortest-input policy
    discarded the deliberately longer credits layer.
  fix: |
    Treat every enabled filter combination and post-roll duration as a concrete
    output contract. Build filter tokens with explicit separators, test each
    optional branch, and preserve the intentional longest timeline rather than
    letting an intermediate stream clamp it. Verify required visual layers in
    the produced command/output, not only process exit success.
  verify: |
    Generate the three-input filter command with each overlay state and assert
    no concatenated format token, exactly the expected format pins, and caption
    burn presence. Exercise a longer credits/scopes layer and assert the command
    does not use a shortest-input clamp that cuts the tail.
  tags: [io, ffmpeg, filter-complex, post-processing, captions, rolling-credits]
  legacy_id: BUG-LOCAL-402

- id: "12.52"
  phase: 12
  area: test-orchestration
  symptom: |
    A crashed or interrupted harness leaves a file-based one-shot environment
    override behind, and a later unrelated headless run silently inherits it,
    executing an auditable profile with the wrong engine or policy.
  cause: |
    A temporary per-leg hook was sourced whenever present but its lifecycle
    depended on a normal post-leg cleanup that does not run after a crash.
  fix: |
    Treat file-based overrides as consume-once capabilities: log their use,
    apply them only to the intended boot, and remove stale hooks before a
    canonical run. Each producer must recreate its hook explicitly for a new
    leg; do not allow an old override to become an invisible process default.
  verify: |
    Seed a stale override hook, start the canonical headless wrapper, and assert
    it removes the hook before boot. Verify the next run's engine/profile receipt
    matches its explicit configuration rather than the orphaned override.
  tags: [test-orchestration, environment-leak, headless-boot, consume-once, stale-hook, provenance, xref-12.47]
  legacy_id: BUG-LOCAL-415

- id: "07.23"
  phase: 7
  area: video-policy
  symptom: |
    A render plan selects only procedural or audio/text-driven video engines
    that do not consume an init image, but an upstream prompt or image-authoring
    stage still calls a costly or fallible image model. The run can spend or
    fail even though no downstream consumer can use the result.
  cause: |
    Still-consumption capability was checked only at the terminal dispatcher.
    Upstream planning treated the presence of an image policy as a request to
    author every role, rather than resolving each role's effective engine
    (including overrides and redirects) and its declared init-image capability.
  fix: |
    Centralize a per-role effective-engine init-image-consumer decision. When a
    complete all-false map proves no role consumes stills, emit an explicit
    empty prompt payload and bypass all upstream visual authoring. In mixed
    policies omit only roles proven procedural and retain unknown roles
    conservatively upstream. Treat an absent, malformed, or unresolvable role
    as unable to prove that role's consumer: the terminal dispatcher must refuse
    generation for that object while still allowing other proven roles to render.
    Re-check the capability at dispatch as defense in depth.
  verify: |
    Cover all-procedural zero writer/model calls, mixed-role filtering,
    force-map and redirect resolution, and fail-safe behavior for
    incomplete/unknown policy. A canonical all-visualizer run emits no image
    objects and completes with its expected ledger and final output.
  tags: [video-policy, image-generation, init-image, capability-gate, all-visualizer, effective-engine, force-map, fail-safe, upstream-bypass, prompt-authoring]
  legacy_id: PBUG-20260712-19
